# Full demo — DemoDSL docs site with 3D Blender device rendering + live webinar simulation
metadata:
  title: "DemoDSL Full Demo — 3D Render + Live Webinar"
  description: "The DemoDSL docs site presented in a photorealistic 3D MacBook with a simulated live webinar audience"
  author: "DemoDSL"
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "en"
  speed: 1.0
  pitch: 0
  narration_gap: 0.3

subtitle:
  enabled: true
  style: "classic"
  speed: "normal"
  font_size: 38
  position: "bottom"

device_rendering:
  device: "macbook_pro_16"
  orientation: "landscape"
  quality: "low"
  render_engine: "eevee"
  camera_animation: "scroll_follow"
  lighting: "cinematic"
  background_preset: "space_dark"
  camera_distance: 1.4
  camera_height: 3
  shadow: true
  bloom: true

webinar:
  enabled: true
  crowd:
    size: 25
    aggressiveness: 0.6
    profiles:
      - name: "Sarah Chen"
        role: "DevOps Lead"
        personality: "curious"
      - name: "Marcus Johnson"
        role: "VP Engineering"
        personality: "skeptical"
      - name: "Emily Davis"
        role: "Product Manager"
        personality: "supportive"
      - name: "Raj Patel"
        role: "Security Architect"
        personality: "hostile"
      - name: "Lisa Wang"
        role: "QA Engineer"
        personality: "curious"
      - name: "Tom Bradley"
        role: "Frontend Developer"
        personality: "supportive"
      - name: "Nadia Rossi"
        role: "CTO"
        personality: "skeptical"
    question_bank:
      - text: "Does this work behind corporate VPNs and auth walls?"
        tone: "neutral"
        timing: "after_step:1"
      - text: "Impressive! How long does a typical render take?"
        tone: "friendly"
        timing: "after_step:2"
      - text: "Can you version-control the YAML configs in Git?"
        tone: "neutral"
        timing: "after_step:3"
      - text: "What happens if the target site changes its DOM between runs?"
        tone: "tough"
        timing: "after_step:4"
      - text: "Why should we use this over just recording a Loom?"
        tone: "tough"
        timing: "after_step:5"
      - text: "Love the declarative approach — very GitOps friendly!"
        tone: "friendly"
        timing: "after_step:6"
      - text: "Is there a way to integrate this into CI/CD pipelines?"
        tone: "neutral"
        timing: "after_step:7"
    llm:
      enabled: false
  display:
    mode: "qa_screen"
    position: "right"
    width: 340
    opacity: 0.95
    theme: "zoom"
    animation: "slide"
    sticky: true
  presenter:
    respond: true
    delay: 1.5
  interruptions:
    enabled: true
    frequency: 0.3
    max_per_step: 1
  reactions:
    enabled: true
    frequency: 0.8
    loom_burst: true

scenarios:
  - name: "DemoDSL Docs — 3D Webinar Tour"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "webkit"
    viewport:
      width: 1440
      height: 900
    natural: true

    avatar:
      enabled: true
      provider: "animated"
      position: "bottom-right"
      size: 100
      style: "clippy"
      shape: "circle"
      show_subtitle: false
      subtitle_font_size: 16

    steps:
      # Step 1: Open the landing page
      - action: "navigate"
        url: "https://fran-cois.github.io/demodsl/"
        narration: "Welcome everyone to today's live webinar! I'm going to walk you through DemoDSL, the open-source tool that turns YAML configs into polished product demo videos."
        wait: 3.0

      # Step 2: Scroll to Install section
      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Let's start with installation. It's a simple pip install — you can be up and running in under a minute."
        wait: 2.5

      # Step 3: Scroll to Features
      - action: "scroll"
        direction: "down"
        pixels: 700
        smooth_scroll: true
        narration: "DemoDSL integrates seven phases into a single pipeline: browser automation, voice narration, subtitles, visual effects, video composition, audio mixing, and multi-format export."
        wait: 3.0

      # Step 4: Scroll to Code Example
      - action: "scroll"
        direction: "down"
        pixels: 800
        smooth_scroll: true
        narration: "Here's the key insight — your entire demo is defined declaratively in YAML. No scripts to maintain, no screen recordings to redo when the UI changes."
        wait: 3.0

      # Step 5: Scroll to Architecture
      - action: "scroll"
        direction: "down"
        pixels: 900
        smooth_scroll: true
        narration: "The architecture uses five proven design patterns: Abstract Factory, Command, Chain of Responsibility, Registry Strategy, and Builder. Each component is modular and extensible."
        wait: 3.0

      # Step 6: Scroll to Pipeline
      - action: "scroll"
        direction: "down"
        pixels: 500
        smooth_scroll: true
        narration: "The pipeline has eight stages, from audio restoration to final optimization. You pick what you need for your use case."
        wait: 3.0

      # Step 7: Final screenshot
      - action: "screenshot"
        filename: "full_blender_webinar_final.png"
        narration: "That wraps up today's demo. Thank you all for attending — and thanks for the excellent questions from the audience! Get started with DemoDSL today."
        wait: 2.0

pipeline:
  - generate_narration: {}
  - composite_avatar: {}
  - burn_subtitles: {}
  - webinar_overlay: {}
  - render_device_3d: {}
  - edit_video: {}

output:
  filename: "demo_full_blender_webinar.mp4"
  directory: "output/"
  formats: ["mp4"]
