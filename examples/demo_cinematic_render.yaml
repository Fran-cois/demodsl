metadata:
  title: "Cinematic 3D Device Render"
  description: "TV-commercial quality render with Cycles, DOF, bloom, and film grain"
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "en"

# Cinematic quality — Cycles at 4K, 512 samples, full post-processing
device_rendering:
  device: "iphone_16_pro_max"
  orientation: "portrait"
  quality: "cinematic"
  render_engine: "cycles"
  camera_animation: "orbit_smooth"
  lighting: "cinematic"
  background_preset: "spotlight"
  camera_distance: 1.4
  camera_height: 0.05
  rotation_speed: 0.6
  shadow: true
  depth_of_field: true
  dof_aperture: 1.8
  bloom: true
  film_grain: 0.15

scenarios:
  - name: "Product Showcase"
    mobile:
      platform: "ios"
      device_name: "iPhone 16 Pro Max"
      bundle_id: "com.example.app"
      automation_name: "XCUITest"
      orientation: "portrait"

    viewport:
      width: 1320
      height: 2868

    steps:
      - action: "wait_for"
        locator: { type: "accessibility_id", value: "HomeScreen" }
        timeout: 10

      - action: "screenshot"

      - action: "tap"
        locator: { type: "accessibility_id", value: "ExploreButton" }

      - action: "screenshot"

      - action: "scroll"
        direction: "down"
        pixels: 600

      - action: "screenshot"
