metadata:
  title: "Fun / Celebration Effects Demo"
  version: "1.0"

scenarios:
  - name: "Emoji Rain"
    url: "https://example.com"
    viewport: {width: 1920, height: 1080}
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: emoji_rain
        wait: 4

  - name: "Fireworks"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: fireworks
        wait: 5

  - name: "Bubbles"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: bubbles
        wait: 4

  - name: "Snow"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: snow
        wait: 6

  - name: "Star Burst"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: star_burst
        wait: 3

  - name: "Party Popper"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
        effects:
          - type: party_popper
        wait: 4
