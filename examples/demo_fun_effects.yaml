metadata:
  title: "Fun / Celebration Effects Demo"
  version: "1.0"

scenarios:
  - name: "Emoji Rain"
    url: "https://example.com"
    viewport: { width: 1920, height: 1080 }
    steps:
      - action: navigate
        url: "https://example.com"
      - action: effect
        effect: { type: emoji_rain }
      - action: wait
        duration: 4

