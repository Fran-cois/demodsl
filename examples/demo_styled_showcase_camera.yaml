# Styled Showcase — DYNAMIC camera variant.
#
# Same React hero (calm, static internal animations) but the LAYER itself
# is animated like a cinematic camera: slow dolly-in, gentle pan / drift,
# micro-rotation, final push. The component does no work — the camera does.
#
# Compare with `demo_styled_showcase.yaml` (the static-camera version).

metadata:
  title: "Styled Showcase — Dynamic Component Beats"
  description: "Four chained hero beats: one movement, one component, one internal effect."
  version: "1.0"

scenarios:
  - name: "styled_showcase_dynamic"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        wait: 10.0

    timeline:
      fps: 30
      layers:
        # ── Deep-space mesh background (very slow drift) ─────────────
        - id: bg_noise
          type: fractal_noise
          width: 2200
          height: 1300
          seed: 7
          octaves: 5
          scale: 720.0
          persistence: 0.45
          lacunarity: 2.0
          color_low: "#04050A"
          color_high: "#0A0E18"
          contrast: 1.3
          brightness: -0.04
          flow_speed: 4.0
          start: 0.0
          duration: 10.0
          transform:
            position: [960, 540]
            anchor: [0.5, 0.5]
            scale: 1.10
          animators:
            # Slow inverse-parallax: bg drifts opposite to camera push
            - property: scale
              keyframes:
                - { t: 0.0,  v: 1.10, ease: ease-in-out }
                - { t: 10.0, v: 1.25 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [960, 540], ease: ease-in-out }
                - { t: 5.0,  v: [945, 555], ease: ease-in-out }
                - { t: 10.0, v: [975, 525] }

        # ── Soft outer vignette (deepens with the push) ──────────────
        - id: vignette
          type: shape
          shape: rectangle
          width: 1920
          height: 1080
          fill: "#000000B0"
          start: 0.0
          duration: 10.0
          transform:
            position: [960, 540]
            anchor: [0.5, 0.5]
          masks:
            - shape: rectangle
              bounds: [0.06, 0.08, 0.94, 0.92]
              feather: 320
              inverted: true
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.40, ease: ease-in-out }
                - { t: 5.0,  v: 0.30, ease: ease-in-out }
                - { t: 10.0, v: 0.55 }

        # ── Beat 1: establish with a spotlight push ──────────────────
        - id: hero_focus
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_focus"
            eyebrow: "NEW — v4.2 SHIPPED"
            title: "The platform for shipping videos"
            subtitle: "Compose layered scenes from React components, MP4 in minutes. Production-grade defaults, zero configuration, every frame deterministic."
            accent: "#6366F1"
            meta:
              - { label: "Conv.",   value: "+ 28%" }
              - { label: "P95",     value: "117 ms" }
              - { label: "Renders", value: "94.1k" }
          start: 0.0
          duration: 3.2
          transform:
            position: [1045, 586]
            anchor: [0.5, 0.5]
            scale: 0.82
            rotation: -2.4
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-out }
                - { t: 0.45, v: 1.0, ease: ease-in-out }
                - { t: 2.55, v: 1.0, ease: ease-in-out }
                - { t: 3.2,  v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.82, ease: ease-out }
                - { t: 1.0, v: 0.96, ease: ease-in-out }
                - { t: 2.4, v: 1.06, ease: ease-in-out }
                - { t: 3.2, v: 1.12 }
            - property: position
              keyframes:
                - { t: 0.0, v: [1045, 586], ease: ease-in-out }
                - { t: 1.0, v: [980, 552], ease: ease-in-out }
                - { t: 2.4, v: [940, 526], ease: ease-in-out }
                - { t: 3.2, v: [915, 508] }
            - property: rotation
              keyframes:
                - { t: 0.0, v: -2.4, ease: ease-in-out }
                - { t: 1.0, v: -0.8, ease: ease-in-out }
                - { t: 2.4, v:  0.3, ease: ease-in-out }
                - { t: 3.2, v:  0.8 }

        # ── Beat 2: diagonal reframing through a prism panel ────────
        - id: hero_prism
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_prism"
            eyebrow: "FLOW — SYSTEM VIEW"
            title: "Sequence every story beat with intent"
            subtitle: "Each move becomes a new framed moment. Switch the visual language, keep the same information architecture, and let the cut do the work."
            accent: "#7C82FF"
            meta:
              - { label: "Shots",  value: "04" }
              - { label: "Tempo",  value: "1.6x" }
              - { label: "Depth",  value: "Layered" }
          start: 2.4
          duration: 3.2
          transform:
            position: [840, 610]
            anchor: [0.5, 0.5]
            scale: 1.18
            rotation: 2.8
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-out }
                - { t: 0.35, v: 1.0, ease: ease-in-out }
                - { t: 2.45, v: 1.0, ease: ease-in-out }
                - { t: 3.2,  v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 1.18, ease: ease-out }
                - { t: 0.9, v: 1.02, ease: ease-in-out }
                - { t: 2.2, v: 1.08, ease: ease-in-out }
                - { t: 3.2, v: 1.14 }
            - property: position
              keyframes:
                - { t: 0.0, v: [840, 610], ease: ease-in-out }
                - { t: 0.9, v: [955, 552], ease: ease-in-out }
                - { t: 2.2, v: [1000, 508], ease: ease-in-out }
                - { t: 3.2, v: [1032, 490] }
            - property: rotation
              keyframes:
                - { t: 0.0, v:  2.8, ease: ease-in-out }
                - { t: 0.9, v:  0.8, ease: ease-in-out }
                - { t: 2.2, v: -0.4, ease: ease-in-out }
                - { t: 3.2, v: -1.0 }

        # ── Beat 3: signal lock with lateral drift ───────────────────
        - id: hero_signal
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_signal"
            eyebrow: "LIVE — SIGNAL LOCK"
            title: "Make the transition feel like a camera decision"
            subtitle: "Push, reframe, hand off, then lock on the next module. The component changes with the move, so the sequence feels edited rather than simply zoomed."
            accent: "#6366F1"
            meta:
              - { label: "Cut",     value: "Match" }
              - { label: "Focus",   value: "Locked" }
              - { label: "Latency", value: "117 ms" }
          start: 4.8
          duration: 3.1
          transform:
            position: [1080, 500]
            anchor: [0.5, 0.5]
            scale: 0.92
            rotation: -1.8
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-out }
                - { t: 0.32, v: 1.0, ease: ease-in-out }
                - { t: 2.2,  v: 1.0, ease: ease-in-out }
                - { t: 3.1,  v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.92, ease: ease-out }
                - { t: 0.8, v: 1.00, ease: ease-in-out }
                - { t: 2.0, v: 1.08, ease: ease-in-out }
                - { t: 3.1, v: 1.16 }
            - property: position
              keyframes:
                - { t: 0.0, v: [1080, 500], ease: ease-in-out }
                - { t: 0.8, v: [980, 520], ease: ease-in-out }
                - { t: 2.0, v: [922, 566], ease: ease-in-out }
                - { t: 3.1, v: [884, 598] }
            - property: rotation
              keyframes:
                - { t: 0.0, v: -1.8, ease: ease-in-out }
                - { t: 0.8, v: -0.4, ease: ease-in-out }
                - { t: 2.0, v:  0.6, ease: ease-in-out }
                - { t: 3.1, v:  0.9 }

        # ── Beat 4: final product lock-up and closing push ───────────
        - id: hero_close
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi"
            eyebrow: "READY — FINAL LOCKUP"
            title: "Finish on the product, not on the trick"
            subtitle: "The last move closes in, recenters, and lets the calm hero land cleanly after the more expressive beats."
            accent: "#6366F1"
            meta:
              - { label: "Story",   value: "Closed" }
              - { label: "Render",  value: "Ready" }
              - { label: "Output",  value: "MP4" }
          start: 7.2
          duration: 2.8
          transform:
            position: [860, 580]
            anchor: [0.5, 0.5]
            scale: 1.20
            rotation: 1.2
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-out }
                - { t: 0.28, v: 1.0, ease: ease-in-out }
                - { t: 2.2,  v: 1.0, ease: ease-in-out }
                - { t: 2.8,  v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 1.20, ease: ease-out }
                - { t: 0.9, v: 1.08, ease: ease-in-out }
                - { t: 2.0, v: 1.12, ease: ease-in-out }
                - { t: 2.8, v: 1.18 }
            - property: position
              keyframes:
                - { t: 0.0, v: [860, 580], ease: ease-in-out }
                - { t: 0.9, v: [930, 552], ease: ease-in-out }
                - { t: 2.0, v: [950, 544], ease: ease-in-out }
                - { t: 2.8, v: [960, 540] }
            - property: rotation
              keyframes:
                - { t: 0.0, v: 1.2, ease: ease-in-out }
                - { t: 0.9, v: 0.2, ease: ease-in-out }
                - { t: 2.0, v: 0.1, ease: ease-in-out }
                - { t: 2.8, v: 0.0 }

pipeline:
  - composite_timeline: {}

output:
  filename: "styled_v2_glowfi_component_beats.mp4"
