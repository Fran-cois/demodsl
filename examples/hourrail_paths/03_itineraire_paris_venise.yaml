# Parcours 3 — Itinéraire détaillé Paris → Venise
# (https://www.hourrail.voyage/fr/itineraire/paris-venise)
# Page détail : segments du trajet, pays traversés, durée, et 2 variantes d'itinéraire.
# 100 % scroll + caméra (pas de clic fragile) car les pages détail sont les plus lourdes.
#
# Lancer :
#   PYTHONPATH="$PWD" python3.11 -m demodsl.cli run \
#     examples/hourrail_paths/03_itineraire_paris_venise.yaml \
#     -o output/hourrail_paths/03_paris_venise --force

metadata:
  title: "HOURRAIL ! — Paris → Venise en train"
  description: "Itinéraire détaillé Paris-Venise : segments, pays traversés et variantes."
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"
  speed: 1.0

subtitle:
  enabled: true
  style: "classic"
  position: "bottom"

scenarios:
  - name: "Itineraire Paris-Venise"
    url: "https://www.hourrail.voyage/fr/itineraire/paris-venise"
    browser: "chrome"
    provider: "playwright"
    viewport:
      width: 1280
      height: 720
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#16a34a"
      click_effect: "ripple"

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr/itineraire/paris-venise"
        narration: "Comment aller de Paris à Venise en train, sans prendre l'avion ? Hourrail te détaille tout."
        wait: 4.0

      - action: "camera"
        camera:
          zoom: 1.18
          target_x: 0.5
          target_y: 0.30
          duration: 1.2
          hold: 1.5
          ease: "ease-out"
        narration: "Un itinéraire clé en main, pensé pour profiter du voyage autant que de la destination."
        wait: 1.0

      - action: "camera_reset"
        wait: 0.5

      - action: "scroll"
        direction: "down"
        pixels: 580
        smooth_scroll: true
        narration: "Le trajet est découpé en segments : Paris vers Milan, puis Milan vers Venise."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.5
            duration: 2.2

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Tu connais à l'avance les pays traversés et la durée totale de transport."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Et pour chaque étape, l'envie d'une pause : Milan, Stuttgart, ou directement Venise."
        wait: 3.0

      - action: "scroll"
        direction: "down"
        pixels: 560
        smooth_scroll: true
        narration: "Deux variantes te sont proposées, pour choisir l'itinéraire qui te ressemble."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.45
            duration: 2.0

pipeline:
  - generate_narration: {}
  - edit_video: {}
  - burn_subtitles: {}
