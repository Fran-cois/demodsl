# Parcours 5 — Le blog (https://www.hourrail.voyage/fr/blog)
# "Le blog des voyages bas carbone" : catégories + articles pratiques.
#
# Lancer :
#   PYTHONPATH="$PWD" python3.11 -m demodsl.cli run \
#     examples/hourrail_paths/05_blog.yaml -o output/hourrail_paths/05_blog --force

metadata:
  title: "HOURRAIL ! — Le blog"
  description: "Le blog des voyages bas carbone : catégories et articles pratiques."
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"
  speed: 1.0

subtitle:
  enabled: true
  style: "classic"
  position: "bottom"

scenarios:
  - name: "Le blog Hourrail"
    url: "https://www.hourrail.voyage/fr/blog"
    browser: "chrome"
    provider: "playwright"
    viewport:
      width: 1280
      height: 720
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#16a34a"
      click_effect: "ripple"

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr/blog"
        narration: "Voici le blog des voyages bas carbone, plein d'inspiration et de conseils pratiques."
        wait: 3.5

      - action: "click"
        locator: { type: "text", value: "Accepter" }
        hover_delay: 0.4
        narration: "On accepte les cookies."
        wait: 2.0

      - action: "camera"
        camera:
          zoom: 1.16
          target_x: 0.5
          target_y: 0.30
          duration: 1.1
          hold: 1.4
          ease: "ease-out"
        narration: "Le blog est organisé par catégories, pour trouver vite ce qui t'intéresse."
        wait: 1.0

      - action: "camera_reset"
        wait: 0.5

      - action: "scroll"
        direction: "down"
        pixels: 480
        smooth_scroll: true
        narration: "Actualités, bons plans, trains de nuit, trains d'exception ou témoignages de voyageurs."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.5
            duration: 2.2

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Comment se faire rembourser un train en retard, ou partir cinq jours à Aarhus au Danemark."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Le Caledonian Sleeper vers l'Écosse, ou même Paris-Singapour en train : tout y passe."
        wait: 3.0

pipeline:
  - generate_narration: {}
  - edit_video: {}
  - burn_subtitles: {}
