# Parcours 4 — Le Club HOURRAIL ! (https://www.hourrail.voyage/le-club-hourrail)
# Réductions partenaires pour les membres : GoVolta, Trenitalia, Recto Verso, Iliens...
#
# Lancer :
#   PYTHONPATH="$PWD" python3.11 -m demodsl.cli run \
#     examples/hourrail_paths/04_club.yaml -o output/hourrail_paths/04_club --force

metadata:
  title: "HOURRAIL ! — Le Club"
  description: "Le Club Hourrail : réductions exclusives chez les partenaires du voyage bas carbone."
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"
  speed: 1.0

subtitle:
  enabled: true
  style: "classic"
  position: "bottom"

scenarios:
  - name: "Le Club Hourrail"
    url: "https://www.hourrail.voyage/le-club-hourrail"
    browser: "chrome"
    provider: "playwright"
    viewport:
      width: 1280
      height: 720
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#16a34a"
      click_effect: "ripple"

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/le-club-hourrail"
        narration: "Voici le Club Hourrail, la communauté des voyageurs qui prennent le train plutôt que l'avion."
        wait: 3.5

      - action: "click"
        locator: { type: "text", value: "Accepter" }
        hover_delay: 0.4
        narration: "On accepte les cookies."
        wait: 2.0

      - action: "scroll"
        direction: "down"
        pixels: 460
        smooth_scroll: true
        narration: "En rejoignant le Club, tu débloques des réductions exclusives chez nos partenaires."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Moins vingt-cinq pour cent chez GoVolta, moins vingt pour cent chez Trenitalia."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.5
            duration: 2.2

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Dix euros chez Recto Verso, quinze pour cent sur les navettes Iliens : de quoi voyager moins cher."
        wait: 3.0

      - action: "scroll"
        direction: "down"
        pixels: 580
        smooth_scroll: true
        narration: "Plus de mille six cents membres en profitent déjà. Et toi, tu montes à bord ?"
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

pipeline:
  - generate_narration: {}
  - edit_video: {}
  - burn_subtitles: {}
