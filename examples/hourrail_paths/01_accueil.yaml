# Parcours 1 — Accueil HOURRAIL ! (https://www.hourrail.voyage/fr)
# Exploré en direct comme le ferait un agent : hero, Club, sections d'itinéraires,
# puis CTA "Voir les itinéraires". Cookies acceptés à l'étape 2 (bannière toujours
# présente dans un contexte playwright neuf).
#
# Lancer :
#   PYTHONPATH="$PWD" python3.11 -m demodsl.cli run \
#     examples/hourrail_paths/01_accueil.yaml -o output/hourrail_paths/01_accueil --force

metadata:
  title: "HOURRAIL ! — Accueil"
  description: "Tour de la page d'accueil : itinéraires bas carbone, Club et catalogue."
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"
  speed: 1.0

subtitle:
  enabled: true
  style: "classic"
  position: "bottom"

scenarios:
  - name: "Accueil hourrail.voyage"
    url: "https://www.hourrail.voyage/fr"
    browser: "chrome"
    provider: "playwright"
    viewport:
      width: 1280
      height: 720
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#16a34a"
      click_effect: "ripple"

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr"
        narration: "Bienvenue sur Hourrail, le planificateur de voyages en train pour partir à l'aventure, sans avion."
        wait: 3.5

      - action: "click"
        locator: { type: "text", value: "Accepter" }
        hover_delay: 0.4
        narration: "On accepte les cookies, et le site se dévoile."
        wait: 2.0

      - action: "camera"
        camera:
          zoom: 1.20
          target_x: 0.5
          target_y: 0.34
          duration: 1.2
          hold: 1.6
          ease: "ease-out"
        narration: "Plus de six cents itinéraires détaillés t'attendent, tous pensés pour voyager bas carbone."
        wait: 1.0

      - action: "camera_reset"
        wait: 0.5

      - action: "scroll"
        direction: "down"
        pixels: 560
        smooth_scroll: true
        narration: "Avec le Club Hourrail, profite de réductions exclusives chez nos partenaires de la mobilité douce."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

      - action: "scroll"
        direction: "down"
        pixels: 640
        smooth_scroll: true
        narration: "Des itinéraires clé en main : boucles itinérantes, trajets directs, ou séjours train plus hôtel."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.5
            duration: 2.2

      - action: "scroll"
        direction: "down"
        pixels: 620
        smooth_scroll: true
        narration: "Chaque circuit est détaillé étape par étape, avec les correspondances et la durée de transport."
        wait: 3.0

      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Filtre par envie, par durée ou par budget, puis accède à tout le catalogue d'itinéraires."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

pipeline:
  - generate_narration: {}
  - edit_video: {}
  - burn_subtitles: {}
