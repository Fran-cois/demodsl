# Parcours 8 — Newsletter "Locomissive" (https://www.hourrail.voyage/fr/newsletter)
# Inscription à la newsletter : saisie organique d'un e-mail (sans soumettre).
#
# Lancer :
#   PYTHONPATH="$PWD" python3.11 -m demodsl.cli run \
#     examples/hourrail_paths/08_newsletter.yaml -o output/hourrail_paths/08_newsletter --force

metadata:
  title: "HOURRAIL ! — Newsletter Locomissive"
  description: "Inscription à la Locomissive : la newsletter du voyage bas carbone."
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"
  speed: 1.0

subtitle:
  enabled: true
  style: "classic"
  position: "bottom"

scenarios:
  - name: "Newsletter Locomissive"
    url: "https://www.hourrail.voyage/fr/newsletter"
    browser: "chrome"
    provider: "playwright"
    viewport:
      width: 1280
      height: 720
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#16a34a"
      click_effect: "ripple"

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr/newsletter"
        narration: "Pour ne rien manquer, abonne-toi à la Locomissive, notre newsletter."
        wait: 3.5

      - action: "click"
        locator: { type: "text", value: "Accepter" }
        hover_delay: 0.4
        narration: "On accepte les cookies."
        wait: 2.0

      - action: "camera"
        camera:
          zoom: 1.18
          target_x: 0.5
          target_y: 0.32
          duration: 1.1
          hold: 1.4
          ease: "ease-out"
        narration: "Reçois notre Locomissive directement dans ta boîte mail."
        wait: 1.0

      - action: "camera_reset"
        wait: 0.5

      - action: "type"
        locator: { type: "css", value: "input[type='email'] >> nth=0" }
        value: "voyageur@exemple.fr"
        char_rate: 11
        zoom_input: true
        narration: "Il suffit d'entrer ton adresse e-mail, comme ceci."
        wait: 2.5

      - action: "scroll"
        direction: "down"
        pixels: 420
        smooth_scroll: true
        narration: "Au programme : des itinéraires et de l'inspiration pour tes prochaines aventures."
        wait: 3.0
        effects:
          - type: "spotlight"
            intensity: 0.5
            duration: 2.2

      - action: "scroll"
        direction: "down"
        pixels: 520
        smooth_scroll: true
        narration: "Des bons plans, des jeux concours, et toute l'actu ferroviaire, deux fois par mois."
        wait: 3.0
        effects:
          - type: "glow"
            color: "#16a34a"
            duration: 2.0

pipeline:
  - generate_narration: {}
  - edit_video: {}
  - burn_subtitles: {}
