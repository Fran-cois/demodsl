# SaaS B2B toolkit — ultra-clean product-demo motion design
# ----------------------------------------------------------
# Showcases the four pillars of a B2B SaaS product demo:
#
#   • Drop shadows on UI cards  → soft, premium-looking depth
#   • Counter texts             → KPIs animating from 0 to their final value
#   • Polyline trim paths       → sparklines drawing themselves in
#   • Spotlight (blur+darken)   → focus the viewer's eye on ONE card
#
# Style brief: NO destructive Hollywood effects. Everything is calm,
# professional, easy to read in B2B settings.

metadata:
  title: "AE SaaS B2B toolkit"
  description: "Spotlight + drop shadow + counter + trim-path polyline"
  version: "1.0"

scenarios:
  - name: "saas_b2b"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        wait: 1.5
      - action: scroll
        direction: down
        pixels: 250
        wait: 6.5

    timeline:
      fps: 30

      layers:
        # ── Dimming overlay so the UI pops on top of the real page ──────
        - id: backdrop
          type: shape
          shape: rectangle
          width: 1920
          height: 1080
          fill: "#0B1220"
          start: 0.0
          transform:
            position: [960, 540]
            anchor: [0.5, 0.5]
            opacity: 0.55

        - id: title
          type: text
          content: "Q2 PERFORMANCE SNAPSHOT"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 32
          color: "#F8FAFC"
          start: 0.2
          transform:
            position: [960, 130]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.6, v: 1.0, ease: ease-out }

        - id: subtitle
          type: text
          content: "Live data · auto-generated by demodsl"
          font_family: "Inter"
          font_size: 18
          color: "#94A3B8"
          start: 0.3
          transform:
            position: [960, 170]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.8, v: 1.0, ease: ease-out }

        # ── Card 1 — Active users ───────────────────────────────────────
        - id: card_users
          type: shape
          shape: rectangle
          width: 480
          height: 260
          fill: "#FFFFFF"
          corner_radius: 16
          start: 0.4
          transform:
            position: [430, 460]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#0B1220"
            opacity: 0.35
            offset_x: 0
            offset_y: 18
            blur: 32
            spread: 2
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }
            - property: position_y
              keyframes:
                - { t: 0.0, v: 500, ease: ease-out }
                - { t: 0.6, v: 460, ease: ease-out }

        - id: card_users_label
          type: text
          content: "ACTIVE USERS"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 16
          color: "#64748B"
          start: 0.7
          transform:
            position: [430, 380]
            anchor: [0.5, 0.5]

        - id: card_users_value
          type: text
          content: "0"
          font_family: "Inter"
          font_weight: "black"
          font_size: 64
          color: "#0F172A"
          start: 0.8
          transform:
            position: [430, 460]
            anchor: [0.5, 0.5]
          counter:
            from_value: 0
            to_value: 12847
            start: 0.0
            duration: 2.0
            ease: ease-out
            format: "{value:,.0f}"

        - id: card_users_delta
          type: text
          content: "+23.4% vs Q1"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 18
          color: "#10B981"
          start: 2.6
          transform:
            position: [430, 540]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }

        # ── Card 2 — Revenue ────────────────────────────────────────────
        - id: card_revenue
          type: shape
          shape: rectangle
          width: 480
          height: 260
          fill: "#FFFFFF"
          corner_radius: 16
          start: 0.55
          transform:
            position: [960, 460]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#0B1220"
            opacity: 0.35
            offset_x: 0
            offset_y: 18
            blur: 32
            spread: 2
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }
            - property: position_y
              keyframes:
                - { t: 0.0, v: 500, ease: ease-out }
                - { t: 0.6, v: 460, ease: ease-out }

        - id: card_revenue_label
          type: text
          content: "MRR"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 16
          color: "#64748B"
          start: 0.85
          transform:
            position: [960, 380]
            anchor: [0.5, 0.5]

        - id: card_revenue_value
          type: text
          content: "$0"
          font_family: "Inter"
          font_weight: "black"
          font_size: 64
          color: "#0F172A"
          start: 0.95
          transform:
            position: [960, 460]
            anchor: [0.5, 0.5]
          counter:
            from_value: 0
            to_value: 34125.50
            start: 0.0
            duration: 2.0
            ease: ease-out
            format: "${value:,.2f}"

        - id: card_revenue_delta
          type: text
          content: "+18.0% vs Q1"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 18
          color: "#10B981"
          start: 2.75
          transform:
            position: [960, 540]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }

        # ── Card 3 — Growth (highlighted by spotlight later) ────────────
        - id: card_growth
          type: shape
          shape: rectangle
          width: 480
          height: 260
          fill: "#FFFFFF"
          corner_radius: 16
          start: 0.7
          transform:
            position: [1490, 460]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#0B1220"
            opacity: 0.35
            offset_x: 0
            offset_y: 18
            blur: 32
            spread: 2
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }
            - property: position_y
              keyframes:
                - { t: 0.0, v: 500, ease: ease-out }
                - { t: 0.6, v: 460, ease: ease-out }

        - id: card_growth_label
          type: text
          content: "GROWTH"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 16
          color: "#64748B"
          start: 1.0
          transform:
            position: [1490, 380]
            anchor: [0.5, 0.5]

        - id: card_growth_value
          type: text
          content: "0.0%"
          font_family: "Inter"
          font_weight: "black"
          font_size: 64
          color: "#0F172A"
          start: 1.1
          transform:
            position: [1490, 460]
            anchor: [0.5, 0.5]
          counter:
            from_value: 0.0
            to_value: 18.3
            start: 0.0
            duration: 2.0
            ease: ease-out
            format: "+{value:.1f}%"

        - id: card_growth_delta
          type: text
          content: "+6.2 pts vs Q1"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 18
          color: "#10B981"
          start: 2.9
          transform:
            position: [1490, 540]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }

        # ── Sparkline chart panel ───────────────────────────────────────
        - id: chart_panel
          type: shape
          shape: rectangle
          width: 1480
          height: 260
          fill: "#FFFFFF"
          corner_radius: 16
          start: 3.2
          transform:
            position: [960, 770]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#0B1220"
            opacity: 0.35
            offset_x: 0
            offset_y: 18
            blur: 32
            spread: 2
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }
            - property: position_y
              keyframes:
                - { t: 0.0, v: 810, ease: ease-out }
                - { t: 0.6, v: 770, ease: ease-out }

        - id: chart_label
          type: text
          content: "WEEKLY ACTIVE USERS - LAST 8 WEEKS"
          font_family: "Inter"
          font_weight: "bold"
          font_size: 16
          color: "#64748B"
          start: 3.6
          transform:
            position: [310, 680]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0, ease: ease-out }

        # Filled area UNDER the line (drawn full, but only visible when
        # the polyline below has finished tracing).
        - id: chart_area
          type: polyline
          start: 3.8
          points:
            - [280, 870]
            - [430, 855]
            - [580, 835]
            - [730, 815]
            - [880, 790]
            - [1030, 760]
            - [1180, 720]
            - [1330, 680]
            - [1480, 660]
            - [1630, 640]
          stroke: "#22D3EE"
          stroke_width: 0
          fill: "#22D3EE"
          fill_baseline_y: 880
          line_cap: round
          transform:
            position: [0, 0]
            anchor: [0, 0]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 1.8, v: 0.0, ease: hold }
                - { t: 2.0, v: 0.18, ease: ease-out }

        # The sparkline itself — draws in from left to right with trim_end.
        - id: chart_line
          type: polyline
          start: 3.8
          points:
            - [280, 870]
            - [430, 855]
            - [580, 835]
            - [730, 815]
            - [880, 790]
            - [1030, 760]
            - [1180, 720]
            - [1330, 680]
            - [1480, 660]
            - [1630, 640]
          stroke: "#22D3EE"
          stroke_width: 5
          line_cap: round
          trim_end_kfs:
            - { t: 0.0, v: 0.0, ease: ease-out }
            - { t: 2.0, v: 1.0, ease: ease-out }
          transform:
            position: [0, 0]
            anchor: [0, 0]

        # Highlight dot at the end of the sparkline — pops in after the
        # line finishes drawing.
        - id: chart_dot
          type: shape
          shape: ellipse
          width: 18
          height: 18
          fill: "#22D3EE"
          stroke: "#FFFFFF"
          stroke_width: 3
          start: 5.8
          transform:
            position: [1630, 640]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#22D3EE"
            opacity: 0.6
            offset_x: 0
            offset_y: 0
            blur: 18
            spread: 0
          animators:
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.4, v: 1.0, ease: ease-out }

        # ── Spotlight that highlights the growth card ───────────────────
        # Activates after all three cards have finished their counter
        # animations. Dims+blurs everything except the rightmost card.
        - id: focus_spotlight
          type: spotlight
          shape: rectangle
          width: 540
          height: 320
          feather: 60
          darken: 0.55
          blur: 6
          corner_radius: 24
          start: 3.0
          duration: 2.0
          transform:
            position: [1490, 460]
            anchor: [0.5, 0.5]

        # ── Callout pointing at the spotlit card ────────────────────────
        - id: callout_bg
          type: shape
          shape: rectangle
          width: 320
          height: 70
          fill: "#22D3EE"
          corner_radius: 12
          start: 3.4
          duration: 1.6
          transform:
            position: [1490, 270]
            anchor: [0.5, 0.5]
          drop_shadow:
            color: "#22D3EE"
            opacity: 0.55
            offset_x: 0
            offset_y: 0
            blur: 28
            spread: 1
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.4, v: 1.0, ease: ease-out }
                - { t: 1.2, v: 1.0, ease: hold }
                - { t: 1.6, v: 0.0, ease: ease-in }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.85, ease: ease-out }
                - { t: 0.4, v: 1.0, ease: ease-out }

        - id: callout_text
          type: text
          content: "KEY METRIC"
          font_family: "Inter"
          font_weight: "black"
          font_size: 22
          color: "#0B1220"
          start: 3.4
          duration: 1.6
          transform:
            position: [1490, 270]
            anchor: [0.5, 0.5]
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.4, v: 1.0, ease: ease-out }
                - { t: 1.2, v: 1.0, ease: hold }
                - { t: 1.6, v: 0.0, ease: ease-in }

pipeline:
  - composite_timeline: {}
