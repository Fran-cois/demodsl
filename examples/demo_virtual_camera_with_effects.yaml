# Virtual camera × post-effects
# -----------------------------
# The live virtual camera (CSS transform on <html>) stacks with the
# render-time post-effects (Remotion). Use the live camera for the
# physical framing of the shot, then layer cinematic post FX on top.

metadata:
  title: "Virtual Camera + Effects"
  description: "Live camera move stacked with post-processing effects"
  version: "1.0"

scenarios:
  - name: "Camera with effects"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        narration: "Cinematic opener."
        effects:
          - { type: vignette, intensity: 0.4 }
          - { type: film_grain, intensity: 0.15 }
        wait: 1.5

      # Live camera zoom while a Ken Burns post-effect drifts.
      - action: camera
        camera:
          zoom: 1.8
          target: { type: css, value: "h1" }
          duration: 1.0
          ease: ease-in-out
          hold: 1.2
        narration: "Live camera punches in while Ken Burns drifts on top."
        effects:
          - { type: ken_burns, scale: 1.1, direction: right }
          - { type: vignette, intensity: 0.5 }

      # Sharp move + camera shake post-effect.
      - action: camera
        camera:
          zoom: 2.4
          target: { type: css, value: "h1" }
          rotation: -3
          duration: 0.4
          ease: spring
          hold: 0.8
        narration: "Snap closer with a handheld feel."
        effects:
          - { type: camera_shake, intensity: 0.25, speed: 6 }
          - { type: chromatic_aberration, offset: 3 }

      - action: camera_reset
        camera: { reset: true, duration: 1.0 }
        effects:
          - { type: fade_out, duration: 1.0 }
