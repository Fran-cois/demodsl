# VectorHeart showcase — 8s portrait beat-driven SVG heart.
#
# Timeline (fps=30):
#   t  0.0 → 8.0   bg_noise   : warm flowing plasma (pink → violet) with slow zoom
#   t  0.0 → 8.0   vignette   : feathered dark frame
#   t  0.3 → 8.0   heart      : VectorHeart, pulses synced to 78 BPM
#   t  6.2 → 8.0   tagline    : GlassCard outro

metadata:
  title: "VectorHeart Showcase"
  description: "Animated SVG heart beating at 78 BPM over flowing plasma"
  version: "1.0"

scenarios:
  - name: "vectorheart"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1080, height: 1920 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        wait: 8.0

    timeline:
      fps: 30
      layers:
        # ── Warm flowing plasma background ───────────────────────────
        - id: bg_noise
          type: fractal_noise
          width: 1080
          height: 1920
          seed: 7
          octaves: 6
          scale: 320.0
          persistence: 0.58
          lacunarity: 2.05
          color_low: "#1A0420"
          color_high: "#F472B6"
          contrast: 1.5
          brightness: -0.05
          flow_speed: 22.0
          start: 0.0
          duration: 8.0
          transform:
            position: [540, 960]
            anchor: [0.5, 0.5]
            scale: 1.08
          animators:
            - property: scale
              keyframes:
                - { t: 0.0, v: 1.08, ease: ease-in-out }
                - { t: 8.0, v: 1.30 }
            - property: position
              keyframes:
                - { t: 0.0, v: [540, 960], ease: ease-in-out }
                - { t: 8.0, v: [560, 940] }

        # ── Feathered dark vignette ──────────────────────────────────
        - id: vignette
          type: shape
          shape: rectangle
          width: 1080
          height: 1920
          fill: "#00000099"
          start: 0.0
          duration: 8.0
          transform:
            position: [540, 960]
            anchor: [0.5, 0.5]
          masks:
            - shape: rectangle
              bounds: [0.04, 0.04, 0.96, 0.96]
              feather: 200
              inverted: true

        # ── VectorHeart ── beating SVG hero ──────────────────────────
        - id: heart
          type: react
          src: "../library/react_components/VectorHeart.tsx"
          width: 800
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            label: "LOVE"
            hueA: 340
            hueB: 280
            bpm: 78
          start: 0.3
          duration: 7.7
          transform:
            position: [540, 880]
            anchor: [0.5, 0.5]
            scale: 1.4
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.6, v: 1.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 1.4, ease: ease-out }
                - { t: 1.0, v: 1.9, ease: ease-in-out }
                - { t: 6.5, v: 1.95 }
                - { t: 7.7, v: 2.1, ease: ease-in }
            - property: position
              keyframes:
                - { t: 0.0, v: [540, 980], ease: ease-in-out }
                - { t: 7.7, v: [540, 880] }

        # ── Outro tagline ────────────────────────────────────────────
        - id: tagline
          type: react
          src: "../library/react_components/GlassCard.tsx"
          width: 820
          height: 380
          mode: static
          device_scale_factor: 2.0
          settle_ms: 60
          props:
            title: "Made with heart"
            subtitle: "Pure SVG. Pure React. Composited per frame."
            rating: 5
            bg: "#1A0420"
            accent: "#F472B6"
          start: 6.0
          duration: 2.0
          transform:
            position: [540, 1560]
            anchor: [0.5, 0.5]
            scale: 0.95
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.5, v: 1.0 }
            - property: position
              keyframes:
                - { t: 0.0, v: [540, 1700], ease: ease-out }
                - { t: 0.8, v: [540, 1560], ease: ease-in-out }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.9, ease: ease-out }
                - { t: 0.8, v: 1.0 }

pipeline:
  - composite_timeline: {}
