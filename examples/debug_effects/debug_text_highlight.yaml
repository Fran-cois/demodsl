# Auto-generated — single effect debug: text_highlight
metadata:
  title: "Debug — text_highlight"
  version: "2.0.0"

scenarios:
  - name: "text_highlight"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1280, height: 720 }
    pre_steps:
      - action: "navigate"
        url: "https://fran-cois.github.io/demodsl/"
        wait: 2.0
    steps:
      - action: "scroll"
        direction: "down"
        pixels: 50
        narration: "Effect: text_highlight"
        wait: 3.5
        effects:
          - type: "text_highlight"
            color: "#FFD700"

pipeline:
  - optimize:
      format: mp4
      codec: h264
      quality: high

output:
  filename: "debug_text_highlight.mp4"
  directory: "output/debug_effects"
