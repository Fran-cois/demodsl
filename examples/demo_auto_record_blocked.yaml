# Demo: Auto-Recording Blocked iFrames
# Shows secondary windows with an X-Frame-Denied URL (github.com)
# that is automatically recorded as a headless video clip and embedded.
#
# Run: demodsl run examples/demo_auto_record_blocked.yaml --force --no-run-cache

metadata:
  title: "Auto-Record Blocked iFrames"
  version: "2.0.0"

subtitle:
  enabled: true
  style: "tiktok"
  speed: "fast"
  font_size: 48
  font_color: "#FFFFFF"
  highlight_color: "#FFD700"
  position: "center"

scenarios:
  - name: "Split View — Blocked URL Auto-Record"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1280, height: 720 }
    background:
      os: "macos"
      theme: "dark"
      wallpaper_color: "#0f172a"
      window_title: "DemoDSL — Safari"
      show_dock: true
      show_menu_bar: true
      window:
        x: 20
        y: 72
        width: 600
        height: 560
      secondary_windows:
        - title: "GitHub — demodsl"
          x: 640
          y: 72
          width: 620
          height: 560
          background_color: "#0d1117"
          app_color: "#8B5CF6"
          url: "https://github.com/Fran-cois/demodsl"
      apps:
        - name: "Safari"
          color: "#3B82F6"
          icon: "M12 2a10 10 0 100 20 10 10 0 000-20zm0 3l3 7-7 3 3-7z"
        - name: "GitHub"
          color: "#8B5CF6"
          icon: "M12 2C6.477 2 2 6.477 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.87 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0012 2z"
        - name: "Terminal"
          color: "#4ADE80"
          icon: "M4 17l6-5-6-5M12 19h8"
    steps:
      - action: "navigate"
        url: "https://fran-cois.github.io/demodsl/"
        narration: "On the left, Safari shows the DemoDSL homepage. On the right, GitHub is automatically recorded as a video because it blocks iframes."
        wait: 4.0

      - action: "scroll"
        direction: "down"
        pixels: 300
        narration: "I can scroll the live browser on the left while the recorded GitHub clip loops on the right."
        wait: 3.0

      - action: "pause"
        narration: "The video was recorded headlessly and cached — no manual work needed."
        wait: 3.0

      - action: "screenshot"
        filename: "auto_record_blocked.png"
        narration: "Auto-recording of blocked iframes — done!"
        wait: 2.0
        effects:
          - type: "success_checkmark"

pipeline:
  - burn_subtitles: {}
  - optimize:
      format: mp4
      codec: h264
      quality: high

output:
  filename: "demo_auto_record_blocked.mp4"
  directory: "output/"
