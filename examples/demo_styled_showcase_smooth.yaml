# Styled Showcase — SMOOTH single-take camera.
#
# Variant A: one hero, very long takes, slow continuous dolly-in.
# The camera does almost imperceptible work — calm and premium.

metadata:
  title: "Styled Showcase — Smooth Dolly"
  description: "Single hero, slow continuous push and gentle pan arc."
  version: "1.0"

scenarios:
  - name: "styled_showcase_smooth"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        wait: 10.0

    timeline:
      fps: 30
      layers:
        - id: bg_noise
          type: fractal_noise
          width: 2200
          height: 1300
          seed: 7
          octaves: 5
          scale: 720.0
          persistence: 0.45
          lacunarity: 2.0
          color_low: "#04050A"
          color_high: "#0A0E18"
          contrast: 1.3
          brightness: -0.04
          flow_speed: 3.0
          start: 0.0
          duration: 10.0
          transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.10 }
          animators:
            - property: scale
              keyframes:
                - { t: 0.0,  v: 1.10, ease: ease-in-out }
                - { t: 10.0, v: 1.22 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [960, 540], ease: ease-in-out }
                - { t: 10.0, v: [974, 528] }

        - id: vignette
          type: shape
          shape: rectangle
          width: 1920
          height: 1080
          fill: "#000000B0"
          start: 0.0
          duration: 10.0
          transform: { position: [960, 540], anchor: [0.5, 0.5] }
          masks:
            - { shape: rectangle, bounds: [0.06, 0.08, 0.94, 0.92], feather: 320, inverted: true }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.38, ease: ease-in-out }
                - { t: 10.0, v: 0.55 }

        - id: hero
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_focus"
            eyebrow: "NEW — v4.2 SHIPPED"
            title: "The platform for shipping videos"
            subtitle: "Compose layered scenes from React components, MP4 in minutes. Production-grade defaults, zero configuration, every frame deterministic."
            accent: "#6366F1"
            meta:
              - { label: "Conv.",   value: "+ 28%" }
              - { label: "P95",     value: "117 ms" }
              - { label: "Renders", value: "94.1k" }
          start: 0.0
          duration: 10.0
          transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 0.95, rotation: -0.3 }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-out }
                - { t: 0.8,  v: 1.0, ease: ease-in-out }
                - { t: 9.2,  v: 1.0, ease: ease-in-out }
                - { t: 10.0, v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0,  v: 0.95, ease: ease-out }
                - { t: 4.0,  v: 1.02, ease: ease-in-out }
                - { t: 10.0, v: 1.12 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [960, 540], ease: ease-in-out }
                - { t: 5.0,  v: [948, 548], ease: ease-in-out }
                - { t: 10.0, v: [968, 532] }
            - property: rotation
              keyframes:
                - { t: 0.0,  v: -0.3, ease: ease-in-out }
                - { t: 5.0,  v:  0.15, ease: ease-in-out }
                - { t: 10.0, v:  0.0 }

pipeline:
  - composite_timeline: {}

output:
  filename: "styled_v2_smooth.mp4"
