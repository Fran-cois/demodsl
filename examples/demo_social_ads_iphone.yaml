metadata:
  title: "Acme — Social Ad (iPhone / 9:16)"
  description: |
    Vertical 1080×1920 reel demoing the social_ads/ library on a
    blank canvas (full-screen background layer covers whatever the
    browser shows). Drop into TikTok / Reels / Shorts.

    All presets are viewport-aware: defaults read from
    ``viewport.w`` / ``viewport.h`` so the same ``$use`` calls
    work on landscape 16:9 and portrait 9:16 with no overrides.
    Overrides below are scene-composition choices (positioning
    multiple elements together), not responsive workarounds.

scenarios:
  - name: "Vertical reel"
    url: "https://example.com/"
    browser: "chrome"
    viewport:
      width: 1080
      height: 1920

    timeline:
      layers:
        # ─── Blank canvas background (always first) ─────────────────────
        - id: bg_canvas
          type: shape
          shape: rectangle
          fill: "#0A0E1F"
          width: 1080
          height: 1920
          start: 0.0
          duration: 22.0
          transform:
            position: [540, 960]

        # Subtle gradient-ish glow blob (centered, slow drift)
        - id: bg_glow
          type: shape
          shape: ellipse
          fill: "#6366F1"
          width: 1200
          height: 1200
          start: 0.0
          duration: 22.0
          transform:
            position: [540, 1100]
            opacity: 0.15

        # ─── 0–2.4s · HOOK (top third) ──────────────────────────────────
        - $use: social_ads/hook_overlay
          $params:
            headline: "STOP SHIPPING SLOW"
            subtitle: "5,000+ SaaS teams cut release time by 70%"
            bg_color: "#0A0E1F"
            accent_color: "#F59E0B"
            start: 0.0
            duration: 2.4

        # ─── 2.4–6s · STAT COUNTER hero ─────────────────────────────────
        # Override y only (defaults to viewport.cy = 960; we want it higher).
        - $use: social_ads/stat_counter
          $params:
            value: 12500
            format: "{value:,.0f}+"
            label: "teams already shipping"
            accent_color: "#22D3EE"
            y: 700
            start: 2.4
            duration: 3.8

        # ─── 4–8s · RATING STARS below hero ─────────────────────────────
        # Override y only — stars naturally fit the portrait width via
        # viewport-aware star_gap default.
        - $use: social_ads/rating_stars
          $params:
            rating_text: "4.9 / 5"
            reviews_text: "from 2,400+ G2 reviews"
            star_color: "#F59E0B"
            y: 1080
            start: 4.0
            duration: 4.0

        # ─── 5–9s · SCROLL-STOP BAR slides over middle ──────────────────
        - $use: social_ads/scroll_stop_bar
          $params:
            text: "Don't scroll — read this"
            bg_color: "#EF4444"
            start: 5.5
            duration: 3.0

        # ─── 7–11s · DISCOUNT BADGE (top right corner) ──────────────────
        # Defaults already pin it to the top-right of any viewport.
        - $use: social_ads/discount_badge
          $params:
            text: "50% OFF"
            sub_text: "First 3 months"
            bg_color: "#F59E0B"
            start: 7.0
            duration: 4.5

        # ─── 8–12s · NOTIFICATION TOAST (top, slide in from right) ──────
        - $use: social_ads/notification_toast
          $params:
            title: "New signup"
            body: "Sarah from Stripe just joined"
            accent_color: "#10B981"
            x: 320
            y: 340
            start: 8.0
            duration: 3.5

        - $use: social_ads/notification_toast
          $params:
            title: "+$1,200 revenue"
            body: "Acme Pro · annual plan"
            accent_color: "#6366F1"
            x: 320
            y: 480
            start: 9.0
            duration: 3.5

        # ─── 10–15s · TESTIMONIAL CARD ──────────────────────────────────
        # Override y only — width defaults to 92% of viewport.w.
        - $use: social_ads/testimonial_card
          $params:
            quote: "Saved our launch. 10/10 would ship again."
            author: "— Marcus, TechCrunch"
            role: "Senior Editor"
            bg_color: "#FFFFFF"
            accent_color: "#6366F1"
            y: 1100
            height: 380
            start: 10.5
            duration: 4.5

        # ─── 12–17s · PROGRESS METER ────────────────────────────────────
        # Override y only — width defaults responsively to viewport.
        - $use: social_ads/progress_meter
          $params:
            title: "Beta waitlist"
            percent: 82
            bar_color: "#22D3EE"
            text_color: "#F8FAFC"
            y: 1500
            start: 15.0
            duration: 3.5

        # ─── 13–18s · FLOATING EMOJIS rising up ─────────────────────────
        # All defaults are viewport-aware — no overrides needed.
        - $use: social_ads/floating_emojis
          $params:
            emoji_1: "🔥"
            emoji_2: "❤️"
            emoji_3: "✨"
            emoji_4: "👍"
            emoji_5: "🚀"
            start: 13.5
            duration: 5.0

        # ─── 16–21s · FOLLOW CTA (bottom right pill) ────────────────────
        # Defaults already pin it to the bottom-right of any viewport.
        - $use: social_ads/follow_cta
          $params:
            text: "Try free"
            bg_color: "#6366F1"
            start: 16.5
            duration: 4.5

        # ─── 17–21s · SWIPE HINT (bottom left to avoid follow CTA) ──────
        # Override x only — defaults center it; we shift it left so it
        # doesn't collide with the follow CTA pill on the right.
        - $use: social_ads/swipe_hint
          $params:
            text: "Tap to start"
            arrow: "^"
            bg_color: "#0F172A"
            x: 280
            start: 17.0
            duration: 4.0

    steps:
      - action: "navigate"
        url: "https://example.com/"
        wait: 21.5

pipeline:
  - composite_timeline: {}
