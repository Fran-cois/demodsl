metadata:
  title: "Cursor Trail Variants Demo"
  version: "1.0"

scenarios:
  - name: "Default dot trail"
    url: "https://example.com"
    viewport: { width: 1920, height: 1080 }
    steps:
      - action: navigate
        url: "https://example.com"
      - action: effect
        effect: { type: cursor_trail }
      - action: wait
        duration: 3

  - name: "Rainbow trail"
    url: "https://example.com"
    steps:
      - action: navigate
        url: "https://example.com"
      - action: effect
        effect: { type: cursor_trail_rainbow }
      - action: wait
        duration: 3

  - name: "Comet trail"
