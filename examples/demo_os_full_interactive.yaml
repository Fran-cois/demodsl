# Full macOS Interactive Showcase (Phase 4)
# Demonstrates all 10 interactive desktop features:
#   Phase 1: Dock interactions + Menu bar dropdowns + Window animations + Context menu
#   Phase 2: Spotlight search + Control Center + Notification Center
#   Phase 3: Mission Control + Launchpad + System Settings
#
# Run: demodsl run examples/demo_os_full_interactive.yaml --force --no-run-cache

metadata:
  title: "macOS Full Interactive Desktop"
  version: "2.0.0"

subtitle:
  enabled: true
  style: "tiktok"
  speed: "fast"
  font_size: 46
  font_color: "#FFFFFF"
  highlight_color: "#FFD700"
  position: "center"

scenarios:
  - name: "Full macOS Desktop Tour"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1440, height: 810 }
    background:
      os: "macos"
      theme: "dark"
      wallpaper_color: "#0f172a"
      window_title: "DemoDSL — Safari"
      show_dock: true
      show_menu_bar: true
      apps:
        - { name: "Safari",   color: "#3B82F6", icon: "M12 2a10 10 0 100 20 10 10 0 000-20zm0 3l3 7-7 3 3-7z", bounce: true }
        - { name: "VS Code",  color: "#007ACC", icon: "M9.4 16.6L4.8 12l4.6-4.6" }
        - { name: "Terminal", color: "#4ADE80", icon: "M4 17l6-5-6-5M12 19h8" }
        - { name: "Finder",   color: "#2196F3", icon: "M4 4h16v16H4z" }
        - { name: "Settings", color: "#6B7280", icon: "M12 8v8m-4-4h8" }
    steps:

      # ──────────────────────────────────────────────────────────────
      # Phase 1: Dock + Window + Menu + Context menu
      # ──────────────────────────────────────────────────────────────
      - action: "navigate"
        url: "https://fran-cois.github.io/demodsl/"
        narration: "Welcome to the full macOS interactive showcase."
        wait: 3.5
        effects:
          - { type: "window_animation", animation: "open", target: "main", duration: 0.5 }

      - action: "pause"
        narration: "The dock is fully interactive — hover to magnify, click to launch."
        wait: 3.0

      - action: "pause"
        narration: "Open the File menu from the menu bar."
        wait: 3.0
        effects:
          - { type: "menu_dropdown", menu: "File", highlight: 2, duration: 2.5 }

      - action: "pause"
        narration: "Right-click anywhere for the contextual menu."
        wait: 3.0
        effects:
          - { type: "context_menu", target_x: 0.5, target_y: 0.55, highlight: 0, duration: 2.5 }

      # ──────────────────────────────────────────────────────────────
      # Phase 2: Spotlight, Control Center, Notification Center
      # ──────────────────────────────────────────────────────────────
      - action: "pause"
        narration: "Press Command + Space to open Spotlight search."
        wait: 5.0
        effects:
          - type: "spotlight_search"
            query: "Visual Studio Code"
            typing_speed: 0.06
            highlight: 2
            duration: 4.5

      - action: "pause"
        narration: "Click the status bar for the Control Center."
        wait: 5.0
        effects:
          - type: "control_center"
            wifi: true
            wifi_name: "Home-Fiber-5G"
            bluetooth: true
            airdrop: true
            focus: false
            brightness: 0.8
            volume: 0.45
            duration: 4.5

      - action: "pause"
        narration: "Swipe from the right for Notification Center."
        wait: 5.5
        effects:
          - type: "notification_center"
            show_widgets: true
            notifications:
              - { app: "Messages", icon: "💬", title: "Alice", body: "See you at 3pm?", time: "now" }
              - { app: "Calendar", icon: "📅", title: "Team standup", body: "In 10 minutes", time: "9:50" }
              - { app: "GitHub",   icon: "✓",  title: "PR #42 merged", body: "feature/os-ui has been merged", time: "8:12" }
            duration: 5.0

      # ──────────────────────────────────────────────────────────────
      # Phase 3: Mission Control, Launchpad, System Settings
      # ──────────────────────────────────────────────────────────────
      - action: "pause"
        narration: "Mission Control shows all your open windows at a glance."
        wait: 4.5
        effects:
          - type: "mission_control"
            highlight: 0
            duration: 4.0

      - action: "pause"
        narration: "Launchpad displays every installed app."
        wait: 4.5
        effects:
          - type: "launchpad"
            highlight: 15
            duration: 4.0

      - action: "pause"
        narration: "Open System Settings to configure Appearance."
        wait: 5.0
        effects:
          - type: "system_settings"
            category: "Appearance"
            duration: 4.5

      - action: "pause"
        narration: "Switch to Wi-Fi settings."
        wait: 5.0
        effects:
          - type: "system_settings"
            category: "Wi-Fi"
            duration: 4.5

      # ──────────────────────────────────────────────────────────────
      # Finale
      # ──────────────────────────────────────────────────────────────
      - action: "pause"
        narration: "Finally, minimize the window with the classic genie effect."
        wait: 2.5
        effects:
          - { type: "window_animation", animation: "minimize", target: "main", duration: 0.7 }

      - action: "screenshot"
        filename: "os_full_interactive.png"
        narration: "10 interactive macOS desktop features — all in DemoDSL."
        wait: 2.5
        effects:
          - { type: "success_checkmark" }
          - { type: "confetti", duration: 2.0 }

pipeline:
  - burn_subtitles: {}
  - optimize:
      format: mp4
      codec: h264
      quality: high

output:
  filename: "demo_os_full_interactive.mp4"
  directory: "output/"
