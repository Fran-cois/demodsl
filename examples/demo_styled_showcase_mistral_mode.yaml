# Styled Showcase — MISTRAL MODE.
#
# Esthétique Mistral AI / Le Chat : crème, sobre, français.
# INVERSE total d'OpenAI mode : fond CLAIR au lieu de noir, accent orange brûlé.
# Géométrique épuré, points orange qui flottent, ligne horizontale fine qui balaye.
# Le hero est PLUS PETIT (scale 0.85) pour laisser respirer le crème autour.
#
# Palette :
#   - BG crème  #FAF4EA
#   - Orange brûlé / brique  #FA500F  (signature Mistral)
#   - Brun chaud  #B07A4A
#   - Noir profond  #1A1A1A
#
# Recette :
#   - bg_color crème plein cadre (shape rectangle 1920×1080).
#   - bg_noise warm très subtil par-dessus (grain papier).
#   - 3 points orange qui flottent en parallax (mini bullets accent).
#   - Hairline orange qui balaye horizontalement en boucle (style "scanner sobre").
#   - Hero unique 2 chapitres, scale 0.85, accent orange brûlé.
#   - PAS DE VIGNETTE noire : on veut que le crème respire jusqu'aux bords.
#   - Animation très mesurée, lente, "à la française".

metadata:
  title: "Styled Showcase — Mistral Mode"
  description: "Fond crème, accent orange brûlé Mistral, géométrique épuré, animation mesurée."
  version: "1.0"

scenarios:
  - name: "styled_showcase_mistral_mode"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "chrome"
    viewport: { width: 1920, height: 1080 }

    steps:
      - action: navigate
        url: "https://fran-cois.github.io/demodsl/"
        wait: 11.0

    timeline:
      fps: 30
      layers:

        # ---------- 1. BACKGROUND CRÈME plein cadre ----------
        - id: bg_cream
          type: shape
          shape: rectangle
          width: 1920
          height: 1080
          fill: "#FAF4EAFF"
          start: 0.0
          duration: 11.0
          transform: { position: [960, 540], anchor: [0.5, 0.5] }

        # ---------- 2. GRAIN PAPIER chaud très subtil ----------
        - id: paper_grain
          type: fractal_noise
          width: 2200
          height: 1300
          seed: 41
          octaves: 5
          scale: 360.0
          persistence: 0.36
          lacunarity: 2.0
          color_low: "#E8DFCC"
          color_high: "#FAF4EA"
          contrast: 1.0
          brightness: 0.0
          flow_speed: 1.5
          start: 0.0
          duration: 11.0
          transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.04 }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.28, ease: linear }
                - { t: 11.0, v: 0.32 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [960, 540], ease: ease-in-out }
                - { t: 11.0, v: [968, 534] }

        # ---------- 3. PASTILLES orange qui flottent (mini accents) ----------
        - id: dot_a
          type: shape
          shape: rectangle
          width: 14
          height: 14
          fill: "#FA500F"
          start: 0.0
          duration: 11.0
          transform: { position: [220, 220], anchor: [0.5, 0.5] }
          masks:
            - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 7, inverted: false }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-in-out }
                - { t: 0.8,  v: 0.95, ease: ease-in-out }
                - { t: 10.5, v: 0.95, ease: ease-in-out }
                - { t: 11.0, v: 0.0 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [220, 220], ease: ease-in-out }
                - { t: 5.5,  v: [240, 235], ease: ease-in-out }
                - { t: 11.0, v: [212, 248] }

        - id: dot_b
          type: shape
          shape: rectangle
          width: 10
          height: 10
          fill: "#FA500F"
          start: 0.0
          duration: 11.0
          transform: { position: [1720, 880], anchor: [0.5, 0.5] }
          masks:
            - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 5, inverted: false }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-in-out }
                - { t: 1.2,  v: 0.75, ease: ease-in-out }
                - { t: 11.0, v: 0.75 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [1720, 880], ease: ease-in-out }
                - { t: 11.0, v: [1740, 865] }

        - id: dot_c
          type: shape
          shape: rectangle
          width: 22
          height: 22
          fill: "#B07A4A"
          start: 0.0
          duration: 11.0
          transform: { position: [1640, 200], anchor: [0.5, 0.5] }
          masks:
            - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 11, inverted: false }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0,  ease: ease-in-out }
                - { t: 1.6,  v: 0.45, ease: ease-in-out }
                - { t: 11.0, v: 0.45 }
            - property: position
              keyframes:
                - { t: 0.0,  v: [1640, 200], ease: ease-in-out }
                - { t: 11.0, v: [1610, 220] }

        - id: dot_d
          type: shape
          shape: rectangle
          width: 8
          height: 8
          fill: "#1A1A1A"
          start: 0.0
          duration: 11.0
          transform: { position: [260, 920], anchor: [0.5, 0.5] }
          masks:
            - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 4, inverted: false }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0,  v: 0.0, ease: ease-in-out }
                - { t: 1.4,  v: 0.55, ease: ease-in-out }
                - { t: 11.0, v: 0.55 }

        # ---------- 5. CHAPITRE 1 — hero plus petit, beaucoup de respiration crème ----------
        # Animation très mesurée : entrée scale spring 0.82→0.85, hold long, fade out crossfade.
        - id: hero_chap1
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_focus"
            eyebrow: "MISTRAL — PARIS"
            title: "Une autre voie pour la vidéo."
            subtitle: "Des composants React qui rendent en MP4. Déterministe. Reproductible. Sobre. Pensé pour les équipes qui livrent."
            accent: "#FA500F"
            meta:
              - { label: "Composants", value: "47" }
              - { label: "Latence",    value: "p95 117 ms" }
              - { label: "Disponible", value: "99.99 %" }
          start: 0.0
          duration: 6.0
          transform: { position: [960, 548], anchor: [0.5, 0.5], scale: 0.82, rotation: 0.0 }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 0.8, v: 1.0, ease: ease-in-out }
                - { t: 4.6, v: 1.0, ease: ease-in-out }
                - { t: 6.0, v: 0.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.82, ease: spring }
                - { t: 1.0, v: 0.85, ease: ease-in-out }
                - { t: 6.0, v: 0.87 }
            - property: position
              keyframes:
                - { t: 0.0, v: [960, 548], ease: spring }
                - { t: 1.0, v: [960, 540], ease: ease-in-out }
                - { t: 6.0, v: [960, 536] }

        # ---------- 6. CHAPITRE 2 — second hero, même grammaire ----------
        - id: hero_chap2
          type: react
          src: "../library/react_components/StyledShowcase.tsx"
          width: 1500
          height: 900
          mode: animated
          capture_fps: 30
          device_scale_factor: 2.0
          settle_ms: 80
          props:
            style: "glowfi_signal"
            eyebrow: "DISPONIBLE"
            title: "Du code à la vidéo, en une commande."
            subtitle: "Streaming preview, re-rendus déterministes, observabilité incluse. Du poste local à la diffusion mondiale."
            accent: "#FA500F"
            meta:
              - { label: "CLI",      value: "demodsl run" }
              - { label: "Santé",    value: "tous au vert" }
              - { label: "Latence",  value: "p99 41 ms" }
          start: 5.0
          duration: 6.0
          transform: { position: [960, 548], anchor: [0.5, 0.5], scale: 0.82, rotation: 0.0 }
          animators:
            - property: opacity
              keyframes:
                - { t: 0.0, v: 0.0, ease: ease-out }
                - { t: 1.0, v: 1.0, ease: ease-in-out }
                - { t: 5.4, v: 1.0, ease: ease-in-out }
                - { t: 6.0, v: 1.0 }
            - property: scale
              keyframes:
                - { t: 0.0, v: 0.82, ease: spring }
                - { t: 1.0, v: 0.85, ease: ease-in-out }
                - { t: 6.0, v: 0.88 }
            - property: position
              keyframes:
                - { t: 0.0, v: [960, 548], ease: spring }
                - { t: 1.0, v: [960, 540], ease: ease-in-out }
                - { t: 6.0, v: [960, 534] }

pipeline:
  - composite_timeline: {}

output:
  filename: "styled_v2_mistral_mode.mp4"
