name: cinematic/vintage
description: Warm vintage look — sepia tones, paper texture, soft vignette.
tags: [cinematic, vintage, retro, warm]
extends: cinematic/film_look
parameters:
  grain_intensity:
    type: number
    default: 0.5
    description: Heavier grain for vintage feel
  letterbox_ratio:
    type: number
    default: 1.78
    description: Standard 16:9 (no letterbox)
  warmth:
    type: number
    default: 0.7
    description: Strong warmth for sepia feel
  vignette_intensity:
    type: number
    default: 0.5
    description: Soft vignette
effects:
  - type: film_grain
    intensity: "{{ grain_intensity }}"
    grain_size: 3
  - type: color_grade
    preset: warm
    intensity: "{{ warmth }}"
  - type: vignette
    intensity: "{{ vignette_intensity }}"
  - type: paper_texture
    intensity: 0.3
