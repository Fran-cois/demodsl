name: social_ads/floating_emojis
description: |
  Five emojis floating upward with stagger — instant TikTok / Reels
  reaction effect. Each emoji rises a fraction of the viewport height
  with subtle horizontal sway.
  Responsive: x positions are fractions of viewport.w; rise distance
  scales with viewport.h.
tags: [social, ads, emoji, reactions, fun, responsive]
parameters:
  emoji_1:
    type: string
    default: "🔥"
  emoji_2:
    type: string
    default: "❤️"
  emoji_3:
    type: string
    default: "✨"
  emoji_4:
    type: string
    default: "👍"
  emoji_5:
    type: string
    default: "🚀"
  base_y:
    type: number
    default: "{{ viewport.h - 100 }}"
  rise:
    type: number
    default: "{{ viewport.h * 0.78 }}"
  size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.085) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 4.5
layers:
  - id: emoji_a
    type: text
    content: "{{ emoji_1 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.w * 0.15 }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: "{{ duration }}", v: "{{ base_y - rise }}", ease: ease-out }
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w * 0.15 }}" }
          - { t: "{{ duration / 2 }}", v: "{{ viewport.w * 0.18 }}", ease: ease-in-out }
          - { t: "{{ duration }}", v: "{{ viewport.w * 0.13 }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.6 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: emoji_b
    type: text
    content: "{{ emoji_2 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.w * 0.32 }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: "{{ duration - 0.3 }}", v: "{{ base_y - rise * 1.02 }}", ease: ease-out }
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w * 0.32 }}" }
          - { t: "{{ (duration - 0.3) / 2 }}", v: "{{ viewport.w * 0.30 }}", ease: ease-in-out }
          - { t: "{{ duration - 0.3 }}", v: "{{ viewport.w * 0.34 }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.9 }}", v: 1 }
          - { t: "{{ duration - 0.3 }}", v: 0 }
  - id: emoji_c
    type: text
    content: "{{ emoji_3 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start + 0.6 }}"
    duration: "{{ duration - 0.6 }}"
    transform:
      position: ["{{ viewport.cx }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: "{{ duration - 0.6 }}", v: "{{ base_y - rise * 1.05 }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 1.2 }}", v: 1 }
          - { t: "{{ duration - 0.6 }}", v: 0 }
  - id: emoji_d
    type: text
    content: "{{ emoji_4 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ viewport.w * 0.68 }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: "{{ duration - 0.9 }}", v: "{{ base_y - rise * 1.01 }}", ease: ease-out }
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w * 0.68 }}" }
          - { t: "{{ (duration - 0.9) / 2 }}", v: "{{ viewport.w * 0.70 }}", ease: ease-in-out }
          - { t: "{{ duration - 0.9 }}", v: "{{ viewport.w * 0.66 }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 1.5 }}", v: 1 }
          - { t: "{{ duration - 0.9 }}", v: 0 }
  - id: emoji_e
    type: text
    content: "{{ emoji_5 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start + 1.2 }}"
    duration: "{{ duration - 1.2 }}"
    transform:
      position: ["{{ viewport.w * 0.85 }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: "{{ duration - 1.2 }}", v: "{{ base_y - rise * 1.04 }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 1.8 }}", v: 1 }
          - { t: "{{ duration - 1.2 }}", v: 0 }
