name: social_ads/floating_emojis
description: |
  Stream of 5 emojis rising up from the bottom with a slight horizontal
  sway. Each emoji is set in a small frosted-glass bubble for that
  premium iOS reaction look.
  Responsive: spread + base_y default to fractions of viewport.
tags: [social, ads, emoji, reaction, fun, glass, responsive]
parameters:
  emoji_1:
    type: string
    default: "🔥"
  emoji_2:
    type: string
    default: "❤️"
  emoji_3:
    type: string
    default: "✨"
  emoji_4:
    type: string
    default: "👍"
  emoji_5:
    type: string
    default: "🚀"
  bubble_color:
    type: color
    default: "#FFFFFF"
  size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.085) }}"
  bubble_size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.12) }}"
  base_y:
    type: number
    default: "{{ viewport.h - 100 }}"
  rise:
    type: number
    default: "{{ int(viewport.h * 0.78) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 5.0
layers:
  - id: emoji_bubble_1
    type: shape
    shape: ellipse
    fill: "{{ bubble_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ bubble_size }}"
    height: "{{ bubble_size }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ int(viewport.w * 0.15) }}", "{{ base_y }}"]
      opacity: 0.28
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: 4.0, v: "{{ base_y - rise }}", ease: ease-out }
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ int(viewport.w * 0.15) }}" }
          - { t: 1.5, v: "{{ int(viewport.w * 0.15) + int(viewport.w * 0.035) }}", ease: ease-in-out }
          - { t: 3.0, v: "{{ int(viewport.w * 0.15) - int(viewport.w * 0.035) }}", ease: ease-in-out }
          - { t: 4.0, v: "{{ int(viewport.w * 0.15) }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: 3.5, v: 0.28 }
          - { t: 4.0, v: 0 }
  - id: emoji_1
    type: text
    content: "{{ emoji_1 }}"
    font_size: "{{ size }}"
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ int(viewport.w * 0.15) }}", "{{ base_y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ base_y }}" }
          - { t: 4.0, v: "{{ base_y - rise }}", ease: ease-out }
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ int(viewport.w * 0.15) }}" }
          - { t: 1.5, v: "{{ int(viewport.w * 0.15) + int(viewport.w * 0.035) }}", ease: ease-in-out }
          - { t: 3.0, v: "{{ int(viewport.w * 0.15) - int(viewport.w * 0.035) }}", ease: ease-in-out }
          - { t: 4.0, v: "{{ int(viewport.w * 0.15) }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: 3.5, v: 1 }
          - { t: 4.0, v: 0 }
  - id: emoji_bubble_2
    type: shape
    shape: ellipse
    fill: "{{ bubble_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ bubble_size }}"
    height: "{{ bubble_size }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
