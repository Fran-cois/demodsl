name: social_ads/stat_counter
description: |
  Huge animated number that ticks from 0 to ``value``, with a label
  underneath. Perfect for "Join 10,000+ teams" / "$2.1M raised" hero
  metrics. Responsive: default x/y are the viewport center; size
  auto-scales to the smaller viewport dimension.
tags: [social, ads, stat, counter, kpi, metric, hero, responsive]
parameters:
  value:
    type: number
    default: 10000
  format:
    type: string
    default: "{value:,.0f}+"
  label:
    type: string
    default: "teams shipping faster"
  color:
    type: color
    default: "#FFFFFF"
  accent_color:
    type: color
    default: "#22D3EE"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.17) }}"
  label_size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.036) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 4.0
layers:
  - id: stat_number
    type: text
    content: "0"
    font_size: "{{ size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y - size * 0.45 }}"]
    counter:
      from_value: 0
      to_value: "{{ value }}"
      start: 0
      duration: "{{ duration - 1.2 }}"
      ease: ease-out
      format: "{{ format }}"
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.08, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: stat_label
    type: text
    content: "{{ label }}"
    font_size: "{{ label_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x }}", "{{ y + size * 0.5 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
          - { t: "{{ duration - 0.8 }}", v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 0 }
