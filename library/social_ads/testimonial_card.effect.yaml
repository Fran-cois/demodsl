name: social_ads/testimonial_card
description: |
  Soft rounded testimonial card with a big quote mark, the quote text,
  author name and role. Slides up with a drop-shadow.
  Responsive: default x/y are the viewport center; width defaults to
  92% of viewport.w (capped).
tags: [social, ads, testimonial, social-proof, card, responsive]
parameters:
  quote:
    type: string
    default: "Shipped our launch in 3 days. Mind-blowing."
  author:
    type: string
    default: "— Maya R."
  role:
    type: string
    default: "Founder, Lumen.io"
  bg_color:
    type: color
    default: "#FFFFFF"
  text_color:
    type: color
    default: "#0F172A"
  accent_color:
    type: color
    default: "#7C3AED"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  width:
    type: number
    default: "{{ min(880, viewport.w * 0.92) }}"
  height:
    type: number
    default: 320
  quote_size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.034) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 5.0
layers:
  - id: tcard_shadow
    type: shape
    shape: rectangle
    fill: "#0F172A"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 28
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x + 8 }}", "{{ y + 14 }}"]
      opacity: 0.25
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y + 60 }}" }
          - { t: 0.5, v: "{{ y + 14 }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.5, v: 0.25 }
          - { t: "{{ duration - 0.4 }}", v: 0.25 }
          - { t: "{{ duration }}", v: 0 }
  - id: tcard_bg
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 28
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y + 50 }}" }
          - { t: 0.5, v: "{{ y }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: tcard_quote_mark
    type: text
    content: "“"
    font_size: 120
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x - width / 2 + 80 }}", "{{ y - height / 2 + 60 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: tcard_quote
    type: text
    content: "{{ quote }}"
    font_size: "{{ quote_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ x }}", "{{ y - 20 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
  - id: tcard_author
    type: text
    content: "{{ author }}"
    font_size: 30
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.7 }}"
    duration: "{{ duration - 0.7 }}"
    transform:
      position: ["{{ x }}", "{{ y + height / 2 - 90 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
  - id: tcard_role
    type: text
    content: "{{ role }}"
    font_size: 22
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ x }}", "{{ y + height / 2 - 50 }}"]
      opacity: 0.6
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.6 }
