name: social_ads/testimonial_card
description: |
  Soft rounded testimonial card with a big quote mark, the quote text,
  author name and role. Glassmorphism: frosted glass body + soft drop
  shadow + top gloss highlight. Slides up.
tags: [social, ads, testimonial, social-proof, card, glass, responsive]
parameters:
  quote:
    type: string
    default: "Shipped our launch in 3 days. Mind-blowing."
  author:
    type: string
    default: "— Maya R."
  role:
    type: string
    default: "Founder, Lumen.io"
  bg_color:
    type: color
    default: "#FFFFFF"
  text_color:
    type: color
    default: "#0F172A"
  accent_color:
    type: color
    default: "#7C3AED"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  width:
    type: number
    default: "{{ min(880, viewport.w * 0.92) }}"
  height:
    type: number
    default: 320
  quote_size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.034) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 5.0
layers:
  - id: tcard_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 32
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x + 8 }}", "{{ y + 18 }}"]
      opacity: 0.32
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y + 70 }}" }
          - { t: 0.5, v: "{{ y + 18 }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.5, v: 0.32 }
          - { t: "{{ duration - 0.4 }}", v: 0.32 }
          - { t: "{{ duration }}", v: 0 }
  - id: tcard_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 32
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.94
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y + 60 }}" }
          - { t: 0.5, v: "{{ y }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.94 }
          - { t: "{{ duration - 0.4 }}", v: 0.94 }
          - { t: "{{ duration }}", v: 0 }
  - id: tcard_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ width - 24 }}"
    height: "{{ int(height * 0.35) }}"
    corner_radius: 24
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.8 }}"
    transform:
      position: ["{{ x }}", "{{ y - height * 0.30 }}"]
      opacity: 0.22
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.22 }
          - { t: "{{ duration - 1.0 }}", v: 0.22 }
          - { t: "{{ duration - 0.8 }}", v: 0 }
  - id: tcard_accent_bar
    type: shape
    shape: rectangle
    fill: "{{ accent_color }}"
    width: 8
    height: "{{ height - 80 }}"
    corner_radius: 4
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.8 }}"
    transform:
      position: ["{{ x - width / 2 + 30 }}", "{{ y }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1, ease: spring }
  - id: tcard_quote_mark
    type: text
    content: "“"
    font_size: 120
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x - width / 2 + 110 }}", "{{ y - height / 2 + 60 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: tcard_quote
    type: text
    content: "{{ quote }}"
    font_size: "{{ quote_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ x + 20 }}", "{{ y - 20 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
  - id: tcard_author
    type: text
    content: "{{ author }}"
    font_size: 30
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.7 }}"
    duration: "{{ duration - 0.7 }}"
    transform:
      position: ["{{ x + 20 }}", "{{ y + height / 2 - 90 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
  - id: tcard_role
    type: text
    content: "{{ role }}"
    font_size: 22
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ x + 20 }}", "{{ y + height / 2 - 50 }}"]
      opacity: 0.6
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.6 }
