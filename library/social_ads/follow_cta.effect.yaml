name: social_ads/follow_cta
description: |
  Bottom-right pulsing CTA pill — "Follow for more", "Try free",
  "Subscribe". Glass body + animated white sheen sweep + soft pulse
  halo. Responsive: default x/y sit in the bottom-right of any viewport.
tags: [social, ads, cta, follow, button, glass, shiny, responsive]
parameters:
  text:
    type: string
    default: "Try free"
  bg_color:
    type: color
    default: "#6366F1"
  text_color:
    type: color
    default: "#FFFFFF"
  width:
    type: number
    default: 280
  height:
    type: number
    default: 78
  x:
    type: number
    default: "{{ viewport.w - 280 }}"
  y:
    type: number
    default: "{{ viewport.h - 140 }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 6.0
layers:
  # Pulsing halo behind everything.
  - id: follow_pulse
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: "{{ height / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.35
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 1.0 }
          - { t: 1.0, v: 1.28, ease: ease-out }
          - { t: 2.0, v: 1.0 }
          - { t: 3.0, v: 1.28, ease: ease-out }
          - { t: 4.0, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0.35 }
          - { t: 1.0, v: 0 }
          - { t: 2.0, v: 0.35 }
          - { t: 3.0, v: 0 }
          - { t: 4.0, v: 0.35 }
  # Glass composite: shadow → tinted glass body → top gloss.
  - id: follow_btn_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: "{{ height / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x + 4 }}", "{{ y + 12 }}"]
      opacity: 0.30
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.5 }
          - { t: 0.4, v: 1.08, ease: spring }
          - { t: 0.7, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.30 }
          - { t: "{{ duration - 0.3 }}", v: 0.30 }
          - { t: "{{ duration }}", v: 0 }
  - id: follow_btn_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: "{{ height / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.85
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.5 }
          - { t: 0.4, v: 1.08, ease: spring }
          - { t: 0.7, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.85 }
          - { t: "{{ duration - 0.3 }}", v: 0.85 }
          - { t: "{{ duration }}", v: 0 }
  - id: follow_btn_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ width - 16 }}"
    height: "{{ int(height * 0.42) }}"
    corner_radius: "{{ height / 3 }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x }}", "{{ y - height * 0.27 }}"]
      opacity: 0.24
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.24 }
          - { t: "{{ duration - 0.6 }}", v: 0.24 }
          - { t: "{{ duration - 0.3 }}", v: 0 }
  # Shiny sheen sweep — narrow tilted bright bar across the pill.
  - id: follow_sheen
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ int(height * 0.55) }}"
    height: "{{ int(height * 1.7) }}"
    start: "{{ start + 0.8 }}"
    duration: "{{ duration - 0.8 }}"
    transform:
      position: ["{{ x - width / 2 - 30 }}", "{{ y }}"]
      rotation: 22
      opacity: 0.0
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ x - width / 2 - 30 }}" }
          - { t: 1.0, v: "{{ x + width / 2 + 30 }}", ease: ease-out }
          - { t: 3.0, v: "{{ x + width / 2 + 30 }}" }
          - { t: 4.0, v: "{{ x - width / 2 - 30 }}" }
          - { t: 4.5, v: "{{ x + width / 2 + 30 }}", ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.2, v: 0.45 }
          - { t: 1.0, v: 0 }
          - { t: 4.0, v: 0 }
          - { t: 4.2, v: 0.45 }
          - { t: 4.5, v: 0 }
  # Label + arrow.
  - id: follow_btn_text
    type: text
    content: "{{ text }}"
    font_size: 28
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x - 20 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: follow_btn_arrow
    type: text
    content: ">"
    font_size: 34
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x + width / 2 - 40 }}", "{{ y - 6 }}"]
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ x + width / 2 - 40 }}" }
          - { t: 0.6, v: "{{ x + width / 2 - 25 }}", ease: ease-in-out }
          - { t: 1.2, v: "{{ x + width / 2 - 40 }}" }
          - { t: 1.8, v: "{{ x + width / 2 - 25 }}", ease: ease-in-out }
          - { t: 2.4, v: "{{ x + width / 2 - 40 }}" }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
