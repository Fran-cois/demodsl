name: social_ads/notification_toast
description: |
  Slack/iOS-style notification toast that slides in from the right
  with a colored dot, title, and body. Glass body + soft shadow for
  a frosted iOS feel.
tags: [social, ads, notification, toast, social-proof, glass, responsive]
parameters:
  title:
    type: string
    default: "New signup"
  body:
    type: string
    default: "Sarah from Stripe just joined"
  accent_color:
    type: color
    default: "#22D3EE"
  bg_color:
    type: color
    default: "#0F172A"
  text_color:
    type: color
    default: "#F8FAFC"
  width:
    type: number
    default: 540
  height:
    type: number
    default: 130
  x:
    type: number
    default: "{{ viewport.w - 320 }}"
  y:
    type: number
    default: 140
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 4.0
layers:
  - id: toast_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 26
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.w + width / 2 }}", "{{ y + 12 }}"]
      opacity: 0.30
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w + width / 2 }}" }
          - { t: 0.5, v: "{{ x + 4 }}", ease: spring }
          - { t: "{{ duration - 0.3 }}", v: "{{ x + 4 }}" }
          - { t: "{{ duration }}", v: "{{ viewport.w + width / 2 }}", ease: ease-in }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.30 }
          - { t: "{{ duration - 0.3 }}", v: 0.30 }
          - { t: "{{ duration }}", v: 0 }
  - id: toast_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: 26
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.w + width / 2 }}", "{{ y }}"]
      opacity: 0.82
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w + width / 2 }}" }
          - { t: 0.5, v: "{{ x }}", ease: spring }
          - { t: "{{ duration - 0.3 }}", v: "{{ x }}" }
          - { t: "{{ duration }}", v: "{{ viewport.w + width / 2 }}", ease: ease-in }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.82 }
          - { t: "{{ duration - 0.3 }}", v: 0.82 }
          - { t: "{{ duration }}", v: 0 }
  - id: toast_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ width - 20 }}"
    height: "{{ int(height * 0.40) }}"
    corner_radius: 18
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.6 }}"
    transform:
      position: ["{{ x }}", "{{ y - height * 0.28 }}"]
      opacity: 0.16
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.16 }
          - { t: "{{ duration - 0.7 }}", v: 0.16 }
          - { t: "{{ duration - 0.6 }}", v: 0 }
  - id: toast_dot
    type: shape
    shape: ellipse
    fill: "{{ accent_color }}"
    width: 22
    height: 22
    start: "{{ start + 0.55 }}"
    duration: "{{ duration - 0.85 }}"
    transform:
      position: ["{{ x - width / 2 + 50 }}", "{{ y - 18 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1.3, ease: spring }
          - { t: 0.7, v: 1.0 }
  - id: toast_title
    type: text
    content: "{{ title }}"
    font_size: 32
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    align: left
    start: "{{ start + 0.55 }}"
    duration: "{{ duration - 0.85 }}"
    transform:
      position: ["{{ x + 30 }}", "{{ y - 22 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: toast_body
    type: text
    content: "{{ body }}"
    font_size: 22
    font_family: Inter
    color: "{{ text_color }}"
    align: left
    start: "{{ start + 0.65 }}"
    duration: "{{ duration - 0.95 }}"
    transform:
      position: ["{{ x + 30 }}", "{{ y + 18 }}"]
      opacity: 0.75
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.75 }
