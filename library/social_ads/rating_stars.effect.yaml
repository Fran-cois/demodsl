name: social_ads/rating_stars
description: |
  Five-star rating row with sequential spring pop + rating label
  ("4.9 / 5") and review count. Stars sit on a soft glass plate
  for a polished social-proof beat just before a CTA.
tags: [social, ads, rating, stars, review, social-proof, glass, responsive]
parameters:
  rating_text:
    type: string
    default: "4.9 / 5"
  reviews_text:
    type: string
    default: "from 2,400+ reviews"
  star_color:
    type: color
    default: "#F59E0B"
  text_color:
    type: color
    default: "#FFFFFF"
  plate_color:
    type: color
    default: "#0F172A"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  star_size:
    type: number
    default: "{{ int(min(viewport.w, viewport.h) * 0.085) }}"
  star_gap:
    type: number
    default: "{{ min(110, viewport.w * 0.11) }}"
  plate_w:
    type: number
    default: "{{ min(720, viewport.w * 0.88) }}"
  plate_h:
    type: number
    default: 240
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 4.0
layers:
  - id: rating_plate_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ plate_w }}"
    height: "{{ plate_h }}"
    corner_radius: 28
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x + 6 }}", "{{ y + 14 }}"]
      opacity: 0.26
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.26 }
          - { t: "{{ duration - 0.4 }}", v: 0.26 }
          - { t: "{{ duration }}", v: 0 }
  - id: rating_plate_glass
    type: shape
    shape: rectangle
    fill: "{{ plate_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ plate_w }}"
    height: "{{ plate_h }}"
    corner_radius: 28
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.75
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.7 }
          - { t: 0.4, v: 1.04, ease: spring }
          - { t: 0.7, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.75 }
          - { t: "{{ duration - 0.3 }}", v: 0.75 }
          - { t: "{{ duration }}", v: 0 }
  - id: rating_plate_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ plate_w - 24 }}"
    height: "{{ int(plate_h * 0.36) }}"
    corner_radius: 22
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.6 }}"
    transform:
      position: ["{{ x }}", "{{ y - plate_h * 0.30 }}"]
      opacity: 0.16
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.16 }
          - { t: "{{ duration - 0.7 }}", v: 0.16 }
          - { t: "{{ duration - 0.6 }}", v: 0 }
  - id: star_1
    type: text
    content: "★"
    font_size: "{{ star_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ star_color }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x - star_gap * 2 }}", "{{ y - 50 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.35, v: 1.2, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.25, v: 1 }
          - { t: "{{ duration - 0.3 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: star_2
    type: text
    content: "★"
    font_size: "{{ star_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ star_color }}"
    start: "{{ start + 0.1 }}"
    duration: "{{ duration - 0.1 }}"
    transform:
      position: ["{{ x - star_gap }}", "{{ y - 50 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.35, v: 1.2, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.25, v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 1 }
          - { t: "{{ duration - 0.1 }}", v: 0 }
  - id: star_3
    type: text
    content: "★"
    font_size: "{{ star_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ star_color }}"
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x }}", "{{ y - 50 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.35, v: 1.2, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.25, v: 1 }
          - { t: "{{ duration - 0.5 }}", v: 1 }
          - { t: "{{ duration - 0.2 }}", v: 0 }
  - id: star_4
    type: text
    content: "★"
    font_size: "{{ star_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ star_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x + star_gap }}", "{{ y - 50 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.35, v: 1.2, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.25, v: 1 }
          - { t: "{{ duration - 0.6 }}", v: 1 }
          - { t: "{{ duration - 0.3 }}", v: 0 }
  - id: star_5
    type: text
    content: "★"
    font_size: "{{ star_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ star_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x + star_gap * 2 }}", "{{ y - 50 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.35, v: 1.2, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.25, v: 1 }
          - { t: "{{ duration - 0.7 }}", v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 0 }
  - id: rating_label
    type: text
    content: "{{ rating_text }}"
    font_size: 44
    font_weight: black
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.7 }}"
    duration: "{{ duration - 0.7 }}"
    transform:
      position: ["{{ x }}", "{{ y + 40 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: reviews_label
    type: text
    content: "{{ reviews_text }}"
    font_size: 24
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ x }}", "{{ y + 90 }}"]
      opacity: 0.7
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.7 }
