name: social_ads/countdown
description: |
  Three-block countdown chip — DAYS · HOURS · MIN — bold numbers
  on frosted glass blocks. Ideal for "Offer ends in" / launch ticker.
  Responsive: blocks auto-resize and re-space to fit any viewport.
tags: [social, ads, countdown, urgency, launch, fomo, glass, responsive]
parameters:
  label:
    type: string
    default: "Offer ends in"
  days:
    type: string
    default: "03"
  hours:
    type: string
    default: "14"
  minutes:
    type: string
    default: "22"
  bg_color:
    type: color
    default: "#0F172A"
  num_color:
    type: color
    default: "#F8FAFC"
  accent_color:
    type: color
    default: "#F59E0B"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  block_w:
    type: number
    default: "{{ min(200, (viewport.w - 80) / 3.3) }}"
  block_h:
    type: number
    default: "{{ min(160, viewport.w * 0.16) }}"
  spacing:
    type: number
    default: "{{ min(240, (viewport.w - 80) / 3) }}"
  num_size:
    type: number
    default: "{{ int(min(96, viewport.w * 0.09)) }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 5.0
layers:
  - id: cd_label
    type: text
    content: "{{ label }}"
    font_size: 32
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y - block_h / 2 - 30 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  # ── Days block
  - id: cd_d_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x - spacing + 4 }}", "{{ y + 12 }}"]
      opacity: 0.28
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.3 }}", v: 0.28 }
          - { t: "{{ duration }}", v: 0 }
  - id: cd_d_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x - spacing }}", "{{ y }}"]
      opacity: 0.88
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.88 }
          - { t: "{{ duration - 0.3 }}", v: 0.88 }
          - { t: "{{ duration }}", v: 0 }
  - id: cd_d_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ block_w - 16 }}"
    height: "{{ int(block_h * 0.40) }}"
    corner_radius: 16
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ x - spacing }}", "{{ y - block_h * 0.27 }}"]
      opacity: 0.18
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.18 }
          - { t: "{{ duration - 0.7 }}", v: 0.18 }
          - { t: "{{ duration - 0.5 }}", v: 0 }
  - id: cd_d_num
    type: text
    content: "{{ days }}"
    font_size: "{{ num_size }}"
    font_weight: black
    font_family: Inter
    color: "{{ num_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x - spacing }}", "{{ y - 10 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: cd_d_lbl
    type: text
    content: "DAYS"
    font_size: 18
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x - spacing }}", "{{ y + block_h / 2 - 30 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  # ── Hours block
  - id: cd_h_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start + 0.1 }}"
    duration: "{{ duration - 0.1 }}"
    transform:
      position: ["{{ x + 4 }}", "{{ y + 12 }}"]
      opacity: 0.28
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.4 }}", v: 0.28 }
          - { t: "{{ duration - 0.1 }}", v: 0 }
  - id: cd_h_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start + 0.1 }}"
    duration: "{{ duration - 0.1 }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.88
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.88 }
          - { t: "{{ duration - 0.4 }}", v: 0.88 }
          - { t: "{{ duration - 0.1 }}", v: 0 }
  - id: cd_h_num
    type: text
    content: "{{ hours }}"
    font_size: "{{ num_size }}"
    font_weight: black
    font_family: Inter
    color: "{{ num_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x }}", "{{ y - 10 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: cd_h_lbl
    type: text
    content: "HOURS"
    font_size: 18
    font_weight: bold
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ x }}", "{{ y + block_h / 2 - 30 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  # ── Minutes block
  - id: cd_m_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x + spacing + 4 }}", "{{ y + 12 }}"]
      opacity: 0.28
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.5 }}", v: 0.28 }
          - { t: "{{ duration - 0.2 }}", v: 0 }
  - id: cd_m_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ block_w }}"
    height: "{{ block_h }}"
    corner_radius: 24
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x + spacing }}", "{{ y }}"]
      opacity: 0.88
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.6 }
          - { t: 0.5, v: 1.05, ease: spring }
          - { t: 0.8, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.88 }
          - { t: "{{ duration - 0.5 }}", v: 0.88 }
          - { t: "{{ duration - 0.2 }}", v: 0 }
  - id: cd_m_num
    type: text
    content: "{{ minutes }}"
    font_size: "{{ num_size }}"
    font_weight: black
    font_family: Inter
    color: "{{ num_color }}"
    start: "{{ start + 0.5 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ x + spacing }}", "{{ y - 10 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: cd_m_lbl
    type: text
