name: social_ads/before_after_split
description: |
  Two pills ("Before" / "After") slide in from opposite sides with a
  thin vertical divider. Frosted glass body + accent stroke on the
  "After" pill to nudge the eye.
tags: [social, ads, before, after, split, glass, responsive]
parameters:
  before_text:
    type: string
    default: "Before"
  after_text:
    type: string
    default: "After"
  before_color:
    type: color
    default: "#64748B"
  after_color:
    type: color
    default: "#22D3EE"
  divider_color:
    type: color
    default: "#FFFFFF"
  pill_w:
    type: number
    default: 260
  pill_h:
    type: number
    default: 88
  margin_x:
    type: number
    default: 80
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 6.0
layers:
  - id: divider
    type: shape
    shape: rectangle
    fill: "{{ divider_color }}"
    width: 3
    height: "{{ viewport.h }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.cx }}", "{{ viewport.cy }}"]
      opacity: 0.5
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1, ease: ease-out }
  # ── Before pill (left)
  - id: before_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ -pill_w }}", "{{ viewport.cy + 14 }}"]
      opacity: 0.28
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ -pill_w }}" }
          - { t: 0.6, v: "{{ margin_x + pill_w / 2 + 4 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.3 }}", v: 0.28 }
          - { t: "{{ duration }}", v: 0 }
  - id: before_glass
    type: shape
    shape: rectangle
    fill: "{{ before_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ -pill_w }}", "{{ viewport.cy }}"]
      opacity: 0.80
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ -pill_w }}" }
          - { t: 0.6, v: "{{ margin_x + pill_w / 2 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.80 }
          - { t: "{{ duration - 0.3 }}", v: 0.80 }
          - { t: "{{ duration }}", v: 0 }
  - id: before_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ pill_w - 16 }}"
    height: "{{ int(pill_h * 0.42) }}"
    corner_radius: "{{ pill_h / 3 }}"
    start: "{{ start + 0.6 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ margin_x + pill_w / 2 }}", "{{ viewport.cy - pill_h * 0.27 }}"]
      opacity: 0.18
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.18 }
          - { t: "{{ duration - 1.2 }}", v: 0.18 }
          - { t: "{{ duration - 0.9 }}", v: 0 }
  - id: before_text
    type: text
    content: "{{ before_text }}"
    font_size: 34
    font_weight: bold
    font_family: Inter
    color: "#FFFFFF"
    start: "{{ start + 0.6 }}"
    duration: "{{ duration - 0.6 }}"
    transform:
      position: ["{{ margin_x + pill_w / 2 }}", "{{ viewport.cy - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  # ── After pill (right)
  - id: after_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.w + pill_w }}", "{{ viewport.cy + 14 }}"]
      opacity: 0.28
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w + pill_w }}" }
          - { t: 0.6, v: "{{ viewport.w - margin_x - pill_w / 2 + 4 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.6 }}", v: 0.28 }
          - { t: "{{ duration - 0.3 }}", v: 0 }
  - id: after_glass
    type: shape
    shape: rectangle
    fill: "{{ after_color }}"
    stroke: "#FFFFFF"
    stroke_width: 3
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.w + pill_w }}", "{{ viewport.cy }}"]
      opacity: 0.92
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w + pill_w }}" }
          - { t: 0.6, v: "{{ viewport.w - margin_x - pill_w / 2 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.92 }
          - { t: "{{ duration - 0.6 }}", v: 0.92 }
          - { t: "{{ duration - 0.3 }}", v: 0 }
  - id: after_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ pill_w - 16 }}"
    height: "{{ int(pill_h * 0.42) }}"
    corner_radius: "{{ pill_h / 3 }}"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 1.2 }}"
    transform:
      position: ["{{ viewport.w - margin_x - pill_w / 2 }}", "{{ viewport.cy - pill_h * 0.27 }}"]
      opacity: 0.22
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.22 }
          - { t: "{{ duration - 1.5 }}", v: 0.22 }
          - { t: "{{ duration - 1.2 }}", v: 0 }
  - id: after_text
    type: text
    content: "{{ after_text }}"
    font_size: 34
    font_weight: bold
    font_family: Inter
    color: "#0F172A"
    start: "{{ start + 0.9 }}"
    duration: "{{ duration - 0.9 }}"
    transform:
      position: ["{{ viewport.w - margin_x - pill_w / 2 }}", "{{ viewport.cy - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
