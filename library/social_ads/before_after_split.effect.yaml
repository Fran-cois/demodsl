name: social_ads/before_after_split
description: |
  Before / After overlay labels — two pills (top-left "BEFORE",
  top-right "AFTER") with optional center divider line.
  Responsive: pills slide in from each viewport edge; divider spans
  the full viewport height.
tags: [social, ads, before, after, comparison, split, responsive]
parameters:
  before_text:
    type: string
    default: "BEFORE"
  after_text:
    type: string
    default: "AFTER"
  before_color:
    type: color
    default: "#EF4444"
  after_color:
    type: color
    default: "#10B981"
  text_color:
    type: color
    default: "#FFFFFF"
  divider_color:
    type: color
    default: "#FFFFFF"
  show_divider:
    type: boolean
    default: true
  pill_w:
    type: number
    default: 240
  pill_h:
    type: number
    default: 76
  y:
    type: number
    default: 100
  margin_x:
    type: number
    default: 120
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 5.0
layers:
  - id: before_pill_bg
    type: shape
    shape: rectangle
    fill: "{{ before_color }}"
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ margin_x + pill_w / 2 }}", "{{ y }}"]
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ -pill_w }}" }
          - { t: 0.4, v: "{{ margin_x + pill_w / 2 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.3 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: before_pill_text
    type: text
    content: "{{ before_text }}"
    font_size: 32
    font_weight: black
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ margin_x + pill_w / 2 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: after_pill_bg
    type: shape
    shape: rectangle
    fill: "{{ after_color }}"
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start + 0.15 }}"
    duration: "{{ duration - 0.15 }}"
    transform:
      position: ["{{ viewport.w - margin_x - pill_w / 2 }}", "{{ y }}"]
    animators:
      - property: position_x
        keyframes:
          - { t: 0, v: "{{ viewport.w + pill_w }}" }
          - { t: 0.4, v: "{{ viewport.w - margin_x - pill_w / 2 }}", ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.45 }}", v: 1 }
          - { t: "{{ duration - 0.15 }}", v: 0 }
  - id: after_pill_text
    type: text
    content: "{{ after_text }}"
    font_size: 32
    font_weight: black
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.45 }}"
    duration: "{{ duration - 0.45 }}"
    transform:
      position: ["{{ viewport.w - margin_x - pill_w / 2 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: split_divider
    type: shape
    shape: rectangle
    fill: "{{ divider_color }}"
    width: 6
    height: "{{ viewport.h }}"
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ viewport.cx }}", "{{ viewport.cy }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 0.5, v: 1.0, ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.9 }
          - { t: "{{ duration - 0.5 }}", v: 0.9 }
          - { t: "{{ duration - 0.2 }}", v: 0 }
