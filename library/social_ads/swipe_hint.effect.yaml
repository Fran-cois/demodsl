name: social_ads/swipe_hint
description: |
  Animated "swipe up" / "tap here" arrow hint for vertical reels &
  stories. Arrow + label inside a soft pill, pulses up & down.
  Responsive: default x/y sit centered near the bottom of any viewport.
tags: [social, ads, swipe, mobile, hint, vertical, responsive]
parameters:
  text:
    type: string
    default: "Swipe up"
  arrow:
    type: string
    default: "^"
  color:
    type: color
    default: "#FFFFFF"
  bg_color:
    type: color
    default: "#0F172A"
  width:
    type: number
    default: 280
  height:
    type: number
    default: 80
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.h - 120 }}"
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 6.0
layers:
  - id: swipe_pill_bg
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: "{{ width }}"
    height: "{{ height }}"
    corner_radius: "{{ height / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.75
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.75 }
          - { t: "{{ duration - 0.4 }}", v: 0.75 }
          - { t: "{{ duration }}", v: 0 }
  - id: swipe_arrow
    type: text
    content: "{{ arrow }}"
    font_size: 40
    font_weight: bold
    font_family: Inter
    color: "{{ color }}"
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x - width / 2 + 50 }}", "{{ y - 4 }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y - 4 }}" }
          - { t: 0.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 1.0, v: "{{ y - 4 }}", ease: ease-in }
          - { t: 1.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 2.0, v: "{{ y - 4 }}", ease: ease-in }
          - { t: 2.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 3.0, v: "{{ y - 4 }}", ease: ease-in }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: swipe_text
    type: text
    content: "{{ text }}"
    font_size: 26
    font_weight: bold
    font_family: Inter
    color: "{{ color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x + 20 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
