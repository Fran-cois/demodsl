name: social_ads/swipe_hint
description: |
  Animated "swipe up" / "tap here" finger-arrow hint for vertical
  reels & stories. Down-arrow plus label, pulses upward.
tags: [social, ads, swipe, mobile, hint, vertical]
parameters:
  text:
    type: string
    default: "Swipe up"
  arrow:
    type: string
    default: "^"
    description: Arrow glyph (^ for up, v for down)
  color:
    type: color
    default: "#FFFFFF"
  bg_color:
    type: color
    default: "#0F172A"
  x:
    type: number
    default: 960
  y:
    type: number
    default: 960
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 6.0
layers:
  - id: swipe_pill_bg
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: 280
    height: 80
    corner_radius: 40
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
      opacity: 0.75
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.75 }
          - { t: "{{ duration - 0.4 }}", v: 0.75 }
          - { t: "{{ duration }}", v: 0 }
  - id: swipe_arrow
    type: text
    content: "{{ arrow }}"
    font_size: 40
    font_weight: bold
    font_family: Inter
    color: "{{ color }}"
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x - 90 }}", "{{ y - 4 }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ y - 4 }}" }
          - { t: 0.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 1.0, v: "{{ y - 4 }}", ease: ease-in }
          - { t: 1.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 2.0, v: "{{ y - 4 }}", ease: ease-in }
          - { t: 2.5, v: "{{ y - 22 }}", ease: ease-out }
          - { t: 3.0, v: "{{ y - 4 }}", ease: ease-in }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
  - id: swipe_text
    type: text
    content: "{{ text }}"
    font_size: 26
    font_weight: bold
    font_family: Inter
    color: "{{ color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ x + 20 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
