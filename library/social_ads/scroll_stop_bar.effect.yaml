name: social_ads/scroll_stop_bar
description: |
  Top full-width attention bar — "WAIT — read this" / "Don't scroll past
  this" — locks viewer attention in the first second of a feed-style ad.
  Responsive: width auto-matches the viewport.
tags: [social, ads, hook, bar, top, responsive]
parameters:
  text:
    type: string
    default: "WAIT — read this"
  bg_color:
    type: color
    default: "#EF4444"
  text_color:
    type: color
    default: "#FFFFFF"
  height:
    type: number
    default: 110
  font_size:
    type: number
    default: 42
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 3.0
layers:
  - id: stop_bar_bg
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: "{{ viewport.w }}"
    height: "{{ height }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.cx }}", "{{ height / 2 }}"]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: "{{ -height }}" }
          - { t: 0.3, v: "{{ height / 2 }}", ease: spring }
          - { t: "{{ duration - 0.3 }}", v: "{{ height / 2 }}" }
          - { t: "{{ duration }}", v: "{{ -height }}", ease: ease-in }
  - id: stop_bar_text
    type: text
    content: "{{ text }}"
    font_size: "{{ font_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.cx }}", "{{ height / 2 }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.95 }
          - { t: 0.5, v: 1.04, ease: ease-in-out }
          - { t: 1.0, v: 0.95 }
          - { t: 1.5, v: 1.04, ease: ease-in-out }
          - { t: 2.0, v: 1.0 }
