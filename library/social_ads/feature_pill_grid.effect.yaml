name: social_ads/feature_pill_grid
description: |
  4 horizontally-arranged feature pills that pop in with stagger —
  ideal for "Auth · Billing · Analytics · API" style feature row.
  Glass body + accent dot + top gloss per pill. Responsive: pill
  width and spacing auto-shrink to fit any viewport.
tags: [social, ads, features, pills, grid, b2b, glass, responsive]
parameters:
  feat_1:
    type: string
    default: "Auth"
  feat_2:
    type: string
    default: "Billing"
  feat_3:
    type: string
    default: "Analytics"
  feat_4:
    type: string
    default: "API"
  bg_color:
    type: color
    default: "#1E293B"
  text_color:
    type: color
    default: "#F8FAFC"
  accent_color:
    type: color
    default: "#22D3EE"
  y:
    type: number
    default: "{{ viewport.h - 160 }}"
  pill_w:
    type: number
    default: "{{ min(280, (viewport.w - 80) / 4) }}"
  spacing:
    type: number
    default: "{{ min(420, (viewport.w - 80) / 4 + 20) }}"
  pill_h:
    type: number
    default: 82
  font_size:
    type: number
    default: 26
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 6.0
layers:
  # Pill 1
  - id: pill_1_shadow
    type: shape
    shape: rectangle
    fill: "#000000"
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.cx - spacing * 1.5 + 4 }}", "{{ y + 12 }}"]
      opacity: 0.28
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.5 }
          - { t: 0.4, v: 1.08, ease: spring }
          - { t: 0.7, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.28 }
          - { t: "{{ duration - 0.3 }}", v: 0.28 }
          - { t: "{{ duration }}", v: 0 }
  - id: pill_1_glass
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    stroke: "#FFFFFF"
    stroke_width: 2
    width: "{{ pill_w }}"
    height: "{{ pill_h }}"
    corner_radius: "{{ pill_h / 2 }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ viewport.cx - spacing * 1.5 }}", "{{ y }}"]
      opacity: 0.85
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.5 }
          - { t: 0.4, v: 1.08, ease: spring }
          - { t: 0.7, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.85 }
          - { t: "{{ duration - 0.3 }}", v: 0.85 }
          - { t: "{{ duration }}", v: 0 }
  - id: pill_1_gloss
    type: shape
    shape: rectangle
    fill: "#FFFFFF"
    width: "{{ pill_w - 16 }}"
    height: "{{ int(pill_h * 0.38) }}"
    corner_radius: "{{ pill_h / 3 }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.5 }}"
    transform:
      position: ["{{ viewport.cx - spacing * 1.5 }}", "{{ y - pill_h * 0.27 }}"]
      opacity: 0.16
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 0.16 }
          - { t: "{{ duration - 0.7 }}", v: 0.16 }
          - { t: "{{ duration - 0.5 }}", v: 0 }
  - id: pill_1_dot
    type: shape
    shape: ellipse
    fill: "{{ accent_color }}"
    width: 14
    height: 14
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.cx - spacing * 1.5 - pill_w / 2 + 22 }}", "{{ y }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1.2, ease: spring }
          - { t: 0.7, v: 1.0 }
  - id: pill_1_text
    type: text
    content: "{{ feat_1 }}"
    font_size: "{{ font_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.3 }}"
    duration: "{{ duration - 0.3 }}"
    transform:
      position: ["{{ viewport.cx - spacing * 1.5 + 14 }}", "{{ y - 4 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
