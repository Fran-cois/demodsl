name: social_ads/progress_meter
description: |
  Animated horizontal progress bar with title and percentage label.
  Bar fills from 0% to ``percent`` over the duration with ease-out.
  Responsive: default width is 60% of the viewport; default x/y are
  the viewport center.
tags: [social, ads, progress, kpi, milestone, responsive]
parameters:
  title:
    type: string
    default: "Beta waitlist"
  percent:
    type: number
    default: 75
  bar_color:
    type: color
    default: "#22D3EE"
  track_color:
    type: color
    default: "#1E293B"
  text_color:
    type: color
    default: "#FFFFFF"
  x:
    type: number
    default: "{{ viewport.cx }}"
  y:
    type: number
    default: "{{ viewport.cy }}"
  width:
    type: number
    default: "{{ min(820, viewport.w * 0.84) }}"
  font_size:
    type: number
    default: 36
  start:
    type: number
    default: 0
  duration:
    type: number
    default: 4.0
layers:
  - id: progress_title
    type: text
    content: "{{ title }}"
    font_size: "{{ font_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x - width / 2 + 80 }}", "{{ y - 60 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: progress_pct
    type: text
    content: "{{ percent }}%"
    font_size: "{{ font_size }}"
    font_weight: bold
    font_family: Inter
    color: "{{ bar_color }}"
    start: "{{ start + 0.2 }}"
    duration: "{{ duration - 0.2 }}"
    transform:
      position: ["{{ x + width / 2 - 60 }}", "{{ y - 60 }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
  - id: progress_track
    type: shape
    shape: rectangle
    fill: "{{ track_color }}"
    width: "{{ width }}"
    height: 22
    corner_radius: 11
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: ["{{ x }}", "{{ y }}"]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 0.3 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: progress_fill
    type: shape
    shape: rectangle
    fill: "{{ bar_color }}"
    width: "{{ width * percent / 100 }}"
    height: 22
    corner_radius: 11
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: ["{{ x - width / 2 + (width * percent / 100) / 2 }}", "{{ y }}"]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.0 }
          - { t: 1.4, v: 1.0, ease: ease-out }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.2, v: 1 }
          - { t: "{{ duration - 0.7 }}", v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 0 }
