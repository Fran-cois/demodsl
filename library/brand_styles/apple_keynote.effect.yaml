name: brand_styles/apple_keynote
description: Apple Keynote-style ambient stack — deep near-black fractal grain, indigo/emerald glow blooms that breathe, soft white hero halo with transition pulses, tight vignette. Pairs with `StyledShowcase.tsx` variants (glowfi_focus/prism/signal). Hero React layers must be authored separately; this preset provides only the cinematic backdrop.
tags: [brand, apple, keynote, cinematic, ambient, glow, vignette]
parameters:
  duration:
    type: number
    default: 14.0
    description: Total stack duration in seconds.
  start:
    type: number
    default: 0.0
    description: Stack start offset in seconds.
  transition_1:
    type: number
    default: 4.5
    description: Time (within the stack) of the first chapter transition — glow + halo + vignette pulse here.
  transition_2:
    type: number
    default: 9.0
    description: Time of the second chapter transition.
layers:
  # ---------- 1. BACKGROUND — quasi noir, très lent
  - id: bg_noise
    type: fractal_noise
    width: 2400
    height: 1400
    seed: 21
    octaves: 6
    scale: 820.0
    persistence: 0.42
    lacunarity: 2.0
    color_low: "#02030A"
    color_high: "#070B1A"
    contrast: 1.5
    brightness: -0.08
    flow_speed: 2.0
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.06 }
    animators:
      - property: scale
        keyframes:
          - { t: 0.0, v: 1.06, ease: ease-in-out }
          - { t: "{{ duration }}", v: 1.18 }
      - property: position
        keyframes:
          - { t: 0.0, v: [960, 540], ease: ease-in-out }
          - { t: "{{ duration }}", v: [970, 532] }

  # ---------- 2. AMBIENT GLOW indigo, dominant chap 1
  - id: ambient_glow_indigo
    type: shape
    shape: rectangle
    width: 1400
    height: 900
    fill: "#6366F140"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [780, 460], anchor: [0.5, 0.5], scale: 1.4 }
    masks:
      - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 380, inverted: false }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.45, ease: ease-in-out }
          - { t: "{{ transition_1 }}", v: 0.55, ease: ease-in-out }
          - { t: "{{ transition_2 }}", v: 0.20, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.35 }
      - property: position
        keyframes:
          - { t: 0.0, v: [780, 460], ease: ease-in-out }
          - { t: "{{ duration }}", v: [880, 520] }
      - property: scale
        keyframes:
          - { t: 0.0, v: 1.40, ease: ease-in-out }
          - { t: "{{ duration }}", v: 1.55 }

  # ---------- 3. AMBIENT GLOW emerald, dominant chap 3
  - id: ambient_glow_emerald
    type: shape
    shape: rectangle
    width: 1400
    height: 900
    fill: "#10B98140"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [1180, 620], anchor: [0.5, 0.5], scale: 1.5 }
    masks:
      - { shape: rectangle, bounds: [0.0, 0.0, 1.0, 1.0], feather: 380, inverted: false }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.18, ease: ease-in-out }
          - { t: "{{ transition_1 }}", v: 0.30, ease: ease-in-out }
          - { t: "{{ transition_2 }}", v: 0.58, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.40 }
      - property: position
        keyframes:
          - { t: 0.0, v: [1180, 620], ease: ease-in-out }
          - { t: "{{ duration }}", v: [1080, 560] }

  # ---------- 4. HERO HALO — white "key light" that pulses at transitions
  - id: hero_halo
    type: shape
    shape: rectangle
    width: 1300
    height: 760
    fill: "#FFFFFF14"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.08 }
    masks:
      - { shape: rectangle, bounds: [0.05, 0.05, 0.95, 0.95], feather: 260, inverted: false }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.0, ease: ease-out }
          - { t: 0.6, v: 0.55, ease: ease-in-out }
          - { t: "{{ transition_1 }}", v: 0.35, ease: ease-in-out }
          - { t: "{{ transition_1 + 0.7 }}", v: 0.65, ease: ease-in-out }
          - { t: "{{ transition_2 }}", v: 0.35, ease: ease-in-out }
          - { t: "{{ transition_2 + 0.7 }}", v: 0.70, ease: ease-in-out }
          - { t: "{{ duration - 0.5 }}", v: 0.42, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.0 }
      - property: scale
        keyframes:
          - { t: 0.0, v: 1.08, ease: ease-in-out }
          - { t: "{{ duration }}", v: 1.18 }

  # ---------- 5. VIGNETTE tight, pulses at transitions
  - id: vignette
    type: shape
    shape: rectangle
    width: 1920
    height: 1080
    fill: "#000000B0"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5] }
    masks:
      - { shape: rectangle, bounds: [0.05, 0.07, 0.95, 0.93], feather: 320, inverted: true }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.42, ease: ease-in-out }
          - { t: "{{ transition_1 + 0.3 }}", v: 0.62, ease: ease-in-out }
          - { t: "{{ transition_1 + 1.1 }}", v: 0.42, ease: ease-in-out }
          - { t: "{{ transition_2 + 0.3 }}", v: 0.62, ease: ease-in-out }
          - { t: "{{ transition_2 + 1.0 }}", v: 0.42, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.58 }
