name: brand_styles/coinbase
description: Coinbase-style ambient — deep navy (#0052FF) saturated background, electric blue glow blobs, crisp white hero halo, fintech-serious. Tight vignette to focus on numbers / charts. Pairs with React heroes featuring KPIs or trading UI.
tags: [brand, coinbase, yc, navy, electric, fintech, crypto]
parameters:
  duration:
    type: number
    default: 12.0
    description: Total stack duration in seconds.
  start:
    type: number
    default: 0.0
    description: Stack start offset in seconds.
layers:
  # ---------- 1. BACKGROUND — bleu nuit saturé, légèrement texturé
  - id: bg_noise
    type: fractal_noise
    width: 2400
    height: 1400
    seed: 53
    octaves: 5
    scale: 900.0
    persistence: 0.40
    lacunarity: 2.0
    color_low: "#04081E"
    color_high: "#0B1640"
    contrast: 1.4
    brightness: -0.06
    flow_speed: 2.5
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.08 }
    animators:
      - property: scale
        keyframes:
          - { t: 0.0, v: 1.08, ease: ease-in-out }
          - { t: "{{ duration }}", v: 1.18 }

  # ---------- 2. ELECTRIC BLUE GLOW — Coinbase signature
  - id: glow_electric
    type: shape
    shape: ellipse
    width: 1500
    height: 1100
    fill: "#0052FF55"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [760, 440], anchor: [0.5, 0.5], scale: 1.3 }
    masks:
      - { shape: ellipse, bounds: [0.0, 0.0, 1.0, 1.0], feather: 460, inverted: false }
    animators:
      - property: position
        keyframes:
          - { t: 0.0, v: [760, 440], ease: ease-in-out }
          - { t: "{{ duration }}", v: [880, 540] }
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.55, ease: ease-in-out }
          - { t: "{{ duration / 2 }}", v: 0.75, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.50 }

  # ---------- 3. CYAN ACCENT — droit, plus pale
  - id: glow_cyan
    type: shape
    shape: ellipse
    width: 1300
    height: 1000
    fill: "#3D7BFF40"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [1280, 660], anchor: [0.5, 0.5], scale: 1.2 }
    masks:
      - { shape: ellipse, bounds: [0.0, 0.0, 1.0, 1.0], feather: 420, inverted: false }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.30, ease: ease-in-out }
          - { t: "{{ duration / 2 }}", v: 0.55, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.40 }
      - property: position
        keyframes:
          - { t: 0.0, v: [1280, 660], ease: ease-in-out }
          - { t: "{{ duration }}", v: [1180, 520] }

  # ---------- 4. HERO HALO — white key light
  - id: hero_halo
    type: shape
    shape: rectangle
    width: 1300
    height: 760
    fill: "#FFFFFF18"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5], scale: 1.08 }
    masks:
      - { shape: rectangle, bounds: [0.05, 0.05, 0.95, 0.95], feather: 260, inverted: false }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.0, ease: ease-out }
          - { t: 0.6, v: 0.60, ease: ease-in-out }
          - { t: "{{ duration - 0.5 }}", v: 0.60, ease: ease-in-out }
          - { t: "{{ duration }}", v: 0.0 }

  # ---------- 5. VIGNETTE serrée
  - id: vignette
    type: shape
    shape: rectangle
    width: 1920
    height: 1080
    fill: "#000000C0"
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform: { position: [960, 540], anchor: [0.5, 0.5] }
    masks:
      - { shape: rectangle, bounds: [0.05, 0.07, 0.95, 0.93], feather: 300, inverted: true }
    animators:
      - property: opacity
        keyframes:
          - { t: 0.0, v: 0.50, ease: linear }
          - { t: "{{ duration }}", v: 0.55 }
