name: cta/end_card
description: Full-screen end card with CTA — perfect demo closer with brand + action prompt.
tags: [cta, outro, end_card, closer, b2b, saas]
parameters:
  headline:
    type: string
    description: Main CTA headline
  action:
    type: string
    default: "Start free trial"
    description: Action text (button label)
  url:
    type: string
    default: ""
    description: Optional URL/handle below the CTA
  bg_color:
    type: color
    default: "#0F172A"
    description: Background color
  accent_color:
    type: color
    default: "#6366F1"
    description: CTA button color
  text_color:
    type: color
    default: "#FFFFFF"
    description: Headline color
  start:
    type: number
    default: 0
    description: Start time
  duration:
    type: number
    default: 4.0
    description: Total duration
layers:
  - id: end_bg
    type: shape
    shape: rectangle
    fill: "{{ bg_color }}"
    width: 1920
    height: 1080
    start: "{{ start }}"
    duration: "{{ duration }}"
    transform:
      position: [960, 540]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1, ease: ease-out }
          - { t: "{{ duration - 0.3 }}", v: 1 }
          - { t: "{{ duration }}", v: 0 }
  - id: end_headline
    type: text
    content: "{{ headline }}"
    font_size: 72
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 0.4 }}"
    duration: "{{ duration - 0.4 }}"
    transform:
      position: [960, 420]
    animators:
      - property: position_y
        keyframes:
          - { t: 0, v: 400 }
          - { t: 0.5, v: 420, ease: spring }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 1 }
          - { t: "{{ duration - 0.7 }}", v: 1 }
          - { t: "{{ duration - 0.4 }}", v: 0 }
  - id: cta_button_bg
    type: shape
    shape: rectangle
    fill: "{{ accent_color }}"
    width: 380
    height: 90
    corner_radius: 14
    start: "{{ start + 0.8 }}"
    duration: "{{ duration - 0.8 }}"
    transform:
      position: [960, 580]
    animators:
      - property: scale
        keyframes:
          - { t: 0, v: 0.7 }
          - { t: 0.4, v: 1.05, ease: spring }
          - { t: 0.6, v: 1.0 }
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 1.1 }}", v: 1 }
          - { t: "{{ duration - 0.8 }}", v: 0 }
  - id: cta_button_text
    type: text
    content: "{{ action }} →"
    font_size: 34
    font_family: Inter
    color: "{{ text_color }}"
    start: "{{ start + 1.0 }}"
    duration: "{{ duration - 1.0 }}"
    transform:
      position: [960, 580]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.3, v: 1 }
          - { t: "{{ duration - 1.3 }}", v: 1 }
          - { t: "{{ duration - 1.0 }}", v: 0 }
  - id: cta_url
    type: text
    content: "{{ url }}"
    font_size: 24
    font_family: Inter
    color: "{{ accent_color }}"
    start: "{{ start + 1.2 }}"
    duration: "{{ duration - 1.2 }}"
    transform:
      position: [960, 680]
    animators:
      - property: opacity
        keyframes:
          - { t: 0, v: 0 }
          - { t: 0.4, v: 0.85 }
          - { t: "{{ duration - 1.5 }}", v: 0.85 }
          - { t: "{{ duration - 1.2 }}", v: 0 }
