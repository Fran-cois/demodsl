metadata:
  title: "Quick 3D Device Render Test"
  description: "Fast low-quality test to see the Blender 3D device render"
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "en"

device_rendering:
  device: "iphone_16_pro_max"
  orientation: "portrait"
  quality: "low"
  render_engine: "eevee"
  camera_animation: "dolly_zoom"
  lighting: "dramatic"
  background_preset: "space_dark"
  camera_distance: 1.4
  shadow: true

scenarios:
  - name: "Quick Test"
    url: "https://www.hourrail.voyage/fr"
    browser: "chrome"
    viewport:
      width: 430
      height: 932

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr"

      - action: "screenshot"
