metadata:
  title: "Parallax Scroll 3D"
  description: "Scroll continu avec caméra parallax synchronisée"
  version: "2.0.0"

device_rendering:
  device: "macbook_pro_16"
  orientation: "landscape"
  quality: "low"
  render_engine: "eevee"
  camera_animation: "scroll_follow"
  lighting: "dramatic"
  background_preset: "space_dark"
  camera_distance: 1.4
  shadow: true

scenarios:
  - name: "Parallax scroll"
    url: "https://www.hourrail.voyage/fr"
    browser: "chrome"
    viewport:
      width: 1440
      height: 900
    natural: true

    pre_steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr"
        wait: 3

    steps:
      - action: "click"
        locator:
          type: "text"
          value: "Accepter"
        wait: 1.5

      - action: "scroll"
        direction: "down"
        pixels: 300
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 300
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 350
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 350
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 400
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 350
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 400
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 350
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 400
        smooth_scroll: true
        wait: 0.4

      - action: "scroll"
        direction: "down"
        pixels: 350
        smooth_scroll: true
        wait: 0.4

      - action: "screenshot"

pipeline:
  - render_device_3d: {}
  - edit_video: {}

output:
  filename: "parallax_scroll"
