# DemoDSL self-demo — captures the docs site at https://fran-cois.github.io/demodsl/
metadata:
  title: "DemoDSL Documentation Site Tour"
  description: "Automated demo of the DemoDSL landing page"
  author: "DemoDSL"
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "en"
  speed: 1.0
  pitch: 0

subtitle:
  enabled: true
  style: "classic"
  speed: "normal"
  font_size: 38
  position: "bottom"

device_rendering:
  device: "macbook_pro_16"
  orientation: "landscape"
  quality: "low"
  render_engine: "eevee"
  camera_animation: "scroll_follow"
  lighting: "dramatic"
  background_preset: "space_dark"
  camera_distance: 1.4
  camera_height: 3
  shadow: true

scenarios:
  - name: "Landing Page Tour"
    url: "https://fran-cois.github.io/demodsl/"
    browser: "webkit"
    viewport:
      width: 1440
      height: 900
    natural: true

    avatar:
      enabled: true
      provider: "animated"
      position: "bottom-right"
      size: 100
      style: "clippy"
      shape: "circle"
      show_subtitle: false
      subtitle_font_size: 16

    steps:
      # Step 1: Open the landing page
      - action: "navigate"
        url: "https://fran-cois.github.io/demodsl/"
        narration: "Welcome to DemoDSL, the DSL-driven automated product demo video generator."
        wait: 3.0

      # Step 2: Scroll to the Install section
      - action: "scroll"
        direction: "down"
        pixels: 600
        smooth_scroll: true
        narration: "Scroll down to discover the Quick Start section. Install DemoDSL with pip."
        wait: 2.0

      # Step 3: Scroll to Features
      - action: "scroll"
        direction: "down"
        pixels: 700
        smooth_scroll: true
        narration: "DemoDSL offers seven integrated phases: browser automation, voice narration, subtitles, visual effects, video composition, audio mixing, and multi-format export."
        wait: 3.0

      # Step 4: Scroll to Code Example
      - action: "scroll"
        direction: "down"
        pixels: 800
        smooth_scroll: true
        narration: "Your entire demo is defined in a single YAML or JSON file. No scripts, no code, just declare what you want."
        wait: 3.0

      # Step 5: Scroll to Architecture
      - action: "scroll"
        direction: "down"
        pixels: 900
        smooth_scroll: true
        narration: "The architecture uses five proven design patterns: Abstract Factory, Command, Chain of Responsibility, Registry Strategy, and Builder."
        wait: 3.0

      # Step 6: Scroll to Pipeline
      - action: "scroll"
        direction: "down"
        pixels: 500
        smooth_scroll: true
        narration: "The pipeline has eight stages, from audio restoration to final optimization. Each stage can be critical or optional."
        wait: 3.0

      # Step 7: Screenshot
      - action: "screenshot"
        filename: "demodsl_site_final.png"
        narration: "That's DemoDSL. Define demos in YAML, generate videos automatically. Get started today!"
        wait: 2.0

pipeline:
  - generate_narration: {}
  - composite_avatar: {}
  - burn_subtitles: {}
  - render_device_3d: {}
  - edit_video: {}

output:
  filename: "demodsl_site_demo.mp4"
  directory: "output/"
  formats: ["mp4"]
