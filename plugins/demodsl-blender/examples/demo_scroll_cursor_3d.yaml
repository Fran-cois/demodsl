metadata:
  title: "Scroll + Cursor + 3D Camera Follow"
  description: "Demo with visible cursor, smooth scrolling, and a Blender camera that follows the scroll movement"
  version: "2.0.0"

voice:
  engine: "gtts"
  voice_id: "fr"

device_rendering:
  device: "iphone_16_pro_max"
  orientation: "portrait"
  quality: "low"
  render_engine: "eevee"
  camera_animation: "scroll_follow"
  lighting: "dramatic"
  background_preset: "space_dark"
  camera_distance: 1.4
  shadow: true

scenarios:
  - name: "Scroll with cursor"
    url: "https://www.hourrail.voyage/fr"
    browser: "chrome"
    viewport:
      width: 430
      height: 932
    natural: true
    cursor:
      visible: true
      style: "dot"
      color: "#00d4ff"
      size: 24
      click_effect: "ripple"
      smooth: 0.5
      bezier: true

    steps:
      - action: "navigate"
        url: "https://www.hourrail.voyage/fr"
        wait: 3

      - action: "click"
        locator:
          type: "text"
          value: "Accepter"
        wait: 1.5

      - action: "scroll"
        direction: "down"
        pixels: 400
        wait: 2

      - action: "scroll"
        direction: "down"
        pixels: 400
        wait: 2

      - action: "scroll"
        direction: "down"
        pixels: 500
        wait: 2

      - action: "scroll"
        direction: "down"
        pixels: 300
        wait: 2

      - action: "screenshot"

output:
  filename: "scroll_cursor_3d"
